// Swipe-to-confirm slider for the final New Round step
function initSwipeConfirm(){
  const track=document.getElementById('swipeTrack');
  const handle=document.getElementById('swipeHandle');
  const fill=document.getElementById('swipeFill');
  const label=document.getElementById('swipeLabel');
  if(!track||!handle) return;

  let dragging=false, startX=0, maxX=0;

  function trackWidth(){ return track.offsetWidth - handle.offsetWidth - 8; } // 8px = handle inset

  function setHandleX(x){
    x=Math.max(0,Math.min(x,maxX));
    handle.style.transform=`translateX(${x}px)`;
    fill.style.width=(x+handle.offsetWidth+8)+'px';
    label.style.opacity = 1-(x/maxX)*0.8;
    return x;
  }

  function onStart(clientX){
    dragging=true;
    maxX=trackWidth();
    startX=clientX - (handle.getBoundingClientRect().left - track.getBoundingClientRect().left);
  }
  function onMove(clientX){
    if(!dragging) return;
    const trackRect=track.getBoundingClientRect();
    const x=clientX - trackRect.left - startX;
    const pos=setHandleX(x);
    if(pos>=maxX-2){
      dragging=false;
      handle.style.transform=`translateX(${maxX}px)`;
      fill.style.width='100%';
      label.textContent='Erasing...';
      setTimeout(()=>confirmNewRound(),150);
    }
  }
  function onEnd(){
    if(!dragging) return;
    dragging=false;
    // Snap back if not completed
    setHandleX(0);
  }

  handle.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX);e.preventDefault();},{passive:false});
  handle.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX);e.preventDefault();},{passive:false});
  handle.addEventListener('touchend',onEnd);
  handle.addEventListener('mousedown',e=>{onStart(e.clientX);e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(dragging)onMove(e.clientX);});
  document.addEventListener('mouseup',onEnd);
}

  if(tbl){ tbl.style.width='auto'; }

  if(btn) btn.style.display='none';

  const offers = Array.from(card.querySelectorAll('.intl-offer')).map(el=>el.closest('.intl-panel')).filter(Boolean);
  offers.forEach(p=>{ p.dataset._expDisp=p.style.display; p.style.display='none'; });

      if(tbl){ tbl.style.width=saved.tblW; }
      if(btn) btn.style.display='';
      offers.forEach(p=>{ p.style.display=p.dataset._expDisp||''; delete p.dataset._expDisp; });
      showExportOverlay(canvas.toDataURL('image/png'), title);

function roundDateStr(){
  const d = G.roundDate ? new Date(G.roundDate) : new Date();
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}

// Returns e.g. "Round started 12:36 PM · Pace of play 4 hours 10 minutes"
// or just the start time if the round isn't finished yet.
function paceOfPlayStr(){
  if(!G.roundDate) return '';
  const start = new Date(G.roundDate);
  const startStr = start.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  if(!G.roundEnd) return `Round started ${startStr}`;
  const end = new Date(G.roundEnd);
  let mins = Math.round((end - start)/60000);
  if(mins < 0) mins = 0;
  const h = Math.floor(mins/60), m = mins%60;
  let dur;
  if(h>0 && m>0) dur = `${h} hour${h>1?'s':''} ${m} minute${m>1?'s':''}`;
  else if(h>0)  dur = `${h} hour${h>1?'s':''}`;
  else          dur = `${m} minute${m>1?'s':''}`;
  return `Round started ${startStr} · Pace of play ${dur}`;
}

function loadHistory(){
  try{ return JSON.parse(localStorage.getItem('nassau_history')||'[]'); }
  catch(e){ return []; }
}
function saveHistoryList(list){
  try{ localStorage.setItem('nassau_history', JSON.stringify(list)); }catch(e){}
}

// Returns true if all 18 holes have a score for every player
function isRoundComplete(){
  if(!G.players.length || !G.scores.length) return false;
  return G.players.every((_,pi)=>G.scores[pi] && G.scores[pi].every(s=>s!==null));
}

// Combined Nassau + 6-Point money totals per player (only meaningful once the round is complete,
// since 6-Point settlement is null until all 18 holes are scored).
function computeCombinedMoney(){
  const total = computeMoney(); // Nassau totals per player, zero-filled
  (G.sixPointGames||[]).forEach(game=>{
    const r=computeSixPoint(game);
    if(r.settlement){
      game.players.forEach((pi,ii)=>{ total[pi] += r.settlement.money[ii]; });
    }
  });
  return total;
}

// 6-Point money per player (zero-filled), independent of Nassau
function computeSixPointMoney(){
  const total = G.players.map(()=>0);
  (G.sixPointGames||[]).forEach(game=>{
    const r=computeSixPoint(game);
    if(r.settlement){
      game.players.forEach((pi,ii)=>{ total[pi] += r.settlement.money[ii]; });
    }
  });
  return total;
}

// Has the current round (by roundDate) already been saved to history?
function isCurrentRoundSaved(){
  if(!G.roundDate) return false;
  const hist=loadHistory();
  return hist.some(r=>r.roundDate===G.roundDate);
}

// Build a snapshot of the current round for storage
function buildRoundSnapshot(){
  const matchups=buildMatchups();
  const money=computeMoney();

  // Capture per-match results, including International if active
  const matches = matchups.map(m=>{
    const games=computeMatchGames(m);
    const intlActive=(G.internationals||{})[m.matchId];
    let intlData=null;
    if(intlActive){
      const intl=computeInternational(m);
      if(intl){
        intlData={
          largePress:intl.largePress,
          bankedToA:intl.bankedToA,
          callerSide:intl.callerSide,
          netToA: intlNetToA(m, intl),
        };
      }
    }
    return {
      type:m.type, sideA:m.sideA, sideB:m.sideB, labelA:m.labelA, labelB:m.labelB,
      bet:m.bet, matchId:m.matchId, games, intlActive:!!intlActive, intlData,
    };
  });

  return {
    roundDate: G.roundDate || new Date().toISOString(),
    roundEnd: G.roundEnd || null,
    weatherStart: G.weatherStart || null,
    weatherEnd: G.weatherEnd || null,
    scorecardOnly: !!G.scorecardOnly,
    savedAt: new Date().toISOString(),
    startHole: G.startHole || 1,
    n: G.n,
    players: G.players.map(p=>({name:p.name, idx:p.idx})),
    par: [...G.par],
    si: [...G.si],
    scores: G.scores.map(s=>[...s]),
    teamGames: JSON.parse(JSON.stringify(G.teamGames)),
    singleGames: JSON.parse(JSON.stringify(G.singleGames)),
    sixPointGames: JSON.parse(JSON.stringify(G.sixPointGames||[])),
    internationals: JSON.parse(JSON.stringify(G.internationals||{})),
    money,
    matches,
  };
}

// Save the current round to history (if not already saved). Returns true if saved.
function saveRoundToHistory(){
  if(!isRoundComplete()) return false;
  if(isCurrentRoundSaved()) return false;
  const hist=loadHistory();
  hist.unshift(buildRoundSnapshot()); // most recent first
  saveHistoryList(hist);
  return true;
}

// Manual "Save Round" button — saves (if not already) and shows a toast

// Renders a single 6-Point game card. Works for both the live screen and the
// read-only history view, since G is temporarily swapped to the snapshot there
// and computeSixPoint(game) reads from whatever G currently holds.
function render6PointCard(game){
  const nm=game.players.map(pi=>G.players[pi].name);
  const r=computeSixPoint(game);
  const pp=game.perPoint;
  const ppLabel = pp<1 ? (pp*100)+'¢' : '$'+pp;

  let html=`<div class="msc-card" style="margin-bottom:14px">
    <div class="msc-card-hdr">
      <div>
        <div class="msc-card-title">${nm.join(' · ')}</div>
        <div class="msc-card-sub">6-Point Game · ${ppLabel}/point · ${roundDateStr()}${G.startHole>1?(' · Shotgun start: Hole '+G.startHole):''}</div>
      </div>
    </div>
    <div class="msc-wrap"><table class="sct">
      <thead><tr><td class="row-lbl par" style="text-align:center">Hole</td><td class="hdr-tot">HCP</td>`;
  nm.forEach((n,ii)=>{
    html+=`<td class="hdr-name">${n}<br><span style="font-size:8px;font-weight:400">Idx ${G.players[game.players[ii]].idx.toFixed(1)}</span></td>`;
  });
  html+='</tr></thead><tbody>';

  let fPar=0,bPar=0;
  const fPts=[0,0,0], bPts=[0,0,0], fScored=[false,false,false], bScored=[false,false,false];

  for(let playIdx=0;playIdx<18;playIdx++){
    const h=actualHoleIdx(playIdx);
    const parVal=G.par[h];
    if(playIdx<9) fPar+=parVal; else bPar+=parVal;

    html+=`<tr><td class="row-lbl" style="font-weight:700;text-align:center;font-size:11px">${h+1}<br><span style="font-size:8px;font-weight:400;color:#999">${parVal}</span></td>`;
    html+=`<td class="tot" style="background:#f5f5f5;color:#666;font-size:10px">${G.si[h]}</td>`;

    const pts=r.pointsPerHole[playIdx];
    game.players.forEach((pi,ii)=>{
      const g=G.scores[pi][h];
      const s=r.strokes[ii][h];
      const inner=g!==null
        ?(s>=2?`<span class="circ-val c2">${g}</span>`:s>=1?`<span class="circ-val">${g}</span>`:`${g}`)
        :(s>=2?`<span class="circ-val c2" style="color:#ccc"></span>`:s>=1?`<span class="circ-val" style="color:#ccc"></span>`:'');
      let ptCell='';
      if(pts!==null){
        ptCell=`<div style="font-size:9px;color:var(--gold);font-weight:800">${pts[ii]}pt</div>`;
        if(playIdx<9){fPts[ii]+=pts[ii];fScored[ii]=true;} else {bPts[ii]+=pts[ii];bScored[ii]=true;}
      }
      html+=`<td class="sc">${inner}${ptCell}</td>`;
    });
    html+='</tr>';

    if(playIdx===8){
      html+=`<tr style="border-top:2px solid var(--gm);border-bottom:2px solid var(--gm)"><td class="row-lbl out">OUT</td><td class="tot out">${fPar}</td>`;
      game.players.forEach((pi,ii)=>html+=`<td class="tot out">${fScored[ii]?fPts[ii]+'pt':'—'}</td>`);
      html+='</tr>';
    }
  }
  html+=`<tr style="border-top:2px solid var(--gm)"><td class="row-lbl out">IN</td><td class="tot out">${bPar}</td>`;
  game.players.forEach((pi,ii)=>html+=`<td class="tot out">${bScored[ii]?bPts[ii]+'pt':'—'}</td>`);
  html+='</tr>';

  html+=`<tr style="border-top:2px solid #546e7a;background:var(--gp)"><td class="row-lbl out" style="font-weight:800">TOT</td><td class="tot" style="font-weight:800">${fPar+bPar}</td>`;
  game.players.forEach((pi,ii)=>html+=`<td class="tot" style="font-weight:800">${r.totals[ii]}pt</td>`);
  html+='</tr>';

  html+='</tbody></table></div>';

  // Settlement
  if(r.settlement){
    html+='<div class="intl-panel intl-active">';
    html+='<div class="intl-txt">🏆 <b>Final — '+r.holesPlayed+' holes</b><br>';
    html+=r.settlement.ranked.map(s=>`${G.players[s.pi].name}: ${s.pts}pt`).join(' · ');
    html+='</div>';
    const moneyLines=[];
    game.players.forEach((pi,ii)=>{
      const v=r.settlement.money[ii];
      if(v!==0){
        moneyLines.push(`<div class="intl-owes" style="margin-top:6px">${G.players[pi].name}: ${fmt(v)}</div>`);
      }
    });
    html+=moneyLines.join('');
    html+='</div>';
  } else {
    html+=`<div class="intl-panel"><div class="intl-txt">In progress — ${r.holesPlayed}/18 holes scored. Running totals: ${game.players.map((pi,ii)=>G.players[pi].name+' '+r.totals[ii]+'pt').join(' · ')}</div></div>`;
  }

  html+='</div>'; // msc-card
  return html;
}

function renderSixPoint(){
  let html='<div style="padding:12px 16px;padding-bottom:170px">';

  if(!G.sixPointGames.length){

function exportData(){
  const payload={
    version:1,
    exportDate:new Date().toISOString(),
    contacts: loadContacts(),
    history:  loadHistory(),
    currentRound: (() => { try{ return JSON.parse(localStorage.getItem('nassau_G')||'null'); }catch(e){return null;} })()
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date();
  a.download=`nassau-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json,application/json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const payload=JSON.parse(ev.target.result);
        if(!payload.version) throw new Error('Not a Nassau Golf backup file.');
        let msg=[];
        if(Array.isArray(payload.contacts)){
          localStorage.setItem('nassau_contacts', JSON.stringify(payload.contacts));
          msg.push(payload.contacts.length+' player contacts');
        }
        if(Array.isArray(payload.history)){
          localStorage.setItem('nassau_history', JSON.stringify(payload.history));
          msg.push(payload.history.length+' rounds of history');
        }
        if(payload.currentRound){
          localStorage.setItem('nassau_G', JSON.stringify(payload.currentRound));
          msg.push('current round');
        }
        showImportResult('✓ Restored: '+msg.join(', ')+'. Reloading app…',false);
        renderHistory();
        // Reload the page after a short delay — cleanest way to ensure everything
        // re-initialises from the freshly restored localStorage data
        setTimeout(()=>{ window.location.reload(); }, 1500);
      } catch(err){
        showImportResult('⚠️ Could not read backup: '+err.message,true);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function showImportResult(msg, isError){
  const el=document.getElementById('importResult');
  if(!el) return;
  el.textContent=msg;
  el.style.color=isError?'var(--red)':'var(--gm)';
  el.style.display='block';
  setTimeout(()=>{ el.style.display='none'; },4000);
}

let _historySnapshot=null;
let _liveGBackup=null;
let _renderReadOnly=false;   // true while rendering a saved/exported round (suppresses Big I offer)

function openHistoryDetail(i){
  const hist=loadHistory();
  const r=hist[i];
  if(!r) return;
  _historySnapshot=r;
  _renderReadOnly=true;

  const d=new Date(r.roundDate);
  const dateStr=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  document.getElementById('historyDetailTitle').textContent=dateStr;
  _historyDateStr=dateStr;

  // Temporarily swap G to the snapshot so existing render functions work unmodified
  _liveGBackup=JSON.parse(JSON.stringify(G));
  Object.assign(G,{
    n:r.n, players:r.players.map(p=>({...p,playHdcp:0,strokes:Array(18).fill(0)})),
    par:r.par, si:r.si, scores:r.scores,
    teamGames:r.teamGames, singleGames:r.singleGames,
    sixPointGames:r.sixPointGames||[],
    internationals:r.internationals, roundDate:r.roundDate, roundEnd:r.roundEnd||null,
    weatherStart:r.weatherStart||null, weatherEnd:r.weatherEnd||null,
    scorecardOnly:!!r.scorecardOnly,
    startHole:r.startHole||1, hole:(r.startHole||1)-1,
  });

  let html='';

  // Final money summary — Nassau + 6-Point combined (skipped for scorecard-only rounds)
  if(!G.scorecardOnly){
    const combinedMoney = computeCombinedMoney();
    html+='<div class="msum" style="margin:10px 0"><div class="msum-hdr">🏁 Final Totals (Nassau + 6-Point)</div>';
    G.players.forEach((p,idx)=>{
      const v=combinedMoney[idx]; const c=v>0?'pos':v<0?'neg':'zero';
      html+=`<div class="mrow"><div class="mname">${p.name}</div><div class="mamt ${c}">${fmt(v)}</div></div>`;
    });
    html+='</div>';
  }

  // Weather summary (start / end) if captured for this round
  const wxLine = weatherSummaryLine(r.weatherStart, r.weatherEnd);
  if(wxLine){
    html+=`<div class="msum" style="margin:10px 0"><div class="msum-hdr">🌦️ Conditions</div><div style="padding:10px 14px;font-size:12px;color:#234;line-height:1.7">${wxLine}</div></div>`;
  }

  // Master scorecard (Derrick-styled)
  html+=renderMasterScorecard();

  // Nassau + 6-Point cards — skipped for scorecard-only rounds
  if(!G.scorecardOnly){
    const matchups=buildMatchups();
    matchups.forEach((m,mi)=>{ html+=renderOneMatchCard(m, mi); });
    G.sixPointGames.forEach((game,gi)=>{ html += renderSixPointCard(game, gi); });
  }

  html+='<div style="text-align:center;padding:14px 0 8px;color:var(--inkl);font-size:10px;opacity:.6">Nassau Golf · Derrick GWC · v16.2</div>';

  document.getElementById('historyDetailBody').innerHTML=html;

  // Restore live G immediately — the rendered HTML strings are already built
  Object.assign(G,_liveGBackup);
  _liveGBackup=null;

  // Avoid duplicate-ID collisions with the live scorecard's #totalsCard
  const dupCard=document.querySelector('#historyDetailBody #totalsCard');
  if(dupCard) dupCard.id='historyTotalsCard';

  // Disable all interactive controls in the read-only view (score wheels, export, International, edit handicap)
  const body=document.getElementById('historyDetailBody');
  body.querySelectorAll('button, .sw-score, .pcard-hdcp, [onclick]').forEach(el=>{
    el.style.pointerEvents='none';
    el.style.opacity = el.classList.contains('export-btn')?'0.3':el.style.opacity;
  });
  // Hide export buttons and International action buttons entirely in history view
  body.querySelectorAll('.export-btn, .intl-btn, .intl-undo').forEach(el=>el.style.display='none');

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-history-detail').classList.add('active');
  _renderReadOnly=false;
}

  const t=document.getElementById('printRoundTitle'); if(t) t.remove();

let _historyDateStr='Round';

// Share the open history round via the iOS/desktop system print engine. This renders the
// scorecard exactly as it looks on screen (rotated headers and all) — no html2canvas — so on
// iPhone you tap Share → Save to Files / Mail to get a clean PDF. Reliable and glitch-free.
function printHistoryRound(){
  const body=document.getElementById('historyDetailBody');
  if(!body) return;

  // Inject a clean printed title (course · date · players) at the top of the round, just for print.
  let titleEl=document.getElementById('printRoundTitle');
  if(!titleEl){
    titleEl=document.createElement('div');
    titleEl.id='printRoundTitle';
    body.insertBefore(titleEl, body.firstChild);
  }
  let playerLine='';
  try{
    const snap=_historySnapshot;
    if(snap && Array.isArray(snap.players)) playerLine = snap.players.map(p=>p.name).join(' · ');
  }catch(e){}
  titleEl.innerHTML = `Nassau Golf · Derrick GWC`
    + `<div class="pr-sub">${_historyDateStr||''}${playerLine?(' — '+playerLine):''}</div>`;

  // Flip into print mode, print, then clean up after the dialog closes.
  document.body.classList.add('printing-round');
  const cleanup=()=>{
    document.body.classList.remove('printing-round');
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  // Fallback cleanup in case afterprint doesn't fire on some browsers.
  setTimeout(()=>{ if(document.body.classList.contains('printing-round')) cleanup(); }, 60000);

  setTimeout(()=>{ window.print(); }, 60);
}

function mmRemovePlayer(i){

  const card=document.getElementById('mmPlayersCard');

  const p=G.players[i];
  const inGames = G.teamGames.some(g=>g.a.includes(i)||g.b.includes(i))
                || G.singleGames.some(s=>s.p1===i||s.p2===i);
  const msg = inGames
    ? `${p.name} is in active match(es). Removing will also remove those matches.`
    : `Remove ${p.name} from the round?`;

  const box=document.createElement('div');
  box.id='mmDelConfirm';
  box.style.cssText='margin-top:8px;padding:10px;background:#fff5f5;border:1.5px solid var(--red);border-radius:8px';
  box.innerHTML=`
    <div style="font-size:13px;color:var(--ink);margin-bottom:8px">${msg}</div>
    <div style="display:flex;gap:8px">
      <button class="mm-close" style="background:var(--red);color:#fff;flex:1" onclick="mmConfirmRemovePlayer(${i})">Remove</button>
      <button class="mm-close" style="background:#eee;color:var(--ink);flex:1" onclick="document.getElementById('mmDelConfirm').remove()">Cancel</button>
    </div>`;
  card.appendChild(box);
}

function mmConfirmRemovePlayer(i){
  // Remove matches involving this player
  G.teamGames = G.teamGames.filter(g=>!g.a.includes(i)&&!g.b.includes(i));
  G.singleGames = G.singleGames.filter(s=>s.p1!==i&&s.p2!==i);

  // Remove player and their scores
  G.players.splice(i,1);
  G.scores.splice(i,1);
  G.n = G.players.length;

  // Re-index remaining matches (indexes shift down by 1 for players after i)
  function reindex(idx){ return idx>i ? idx-1 : idx; }
  G.teamGames.forEach(g=>{ g.a=g.a.map(reindex); g.b=g.b.map(reindex); });
  G.singleGames.forEach(s=>{ s.p1=reindex(s.p1); s.p2=reindex(s.p2); });

function loadContacts(){
  try{ return JSON.parse(localStorage.getItem('nassau_contacts')||'[]'); }
  catch(e){ return []; }
}
function saveContacts(contacts){
  try{ localStorage.setItem('nassau_contacts', JSON.stringify(contacts)); }catch(e){}
}

// ── Favorites ──
// Up to 5 saved players can be marked as favorites; exactly one of them can be "Me"
// (the scorekeeper), who always fills slot 1. Stored as fav:true / me:true on the contact.
const MAX_FAVORITES = 5;

function loadFavorites(){
  // Returns favorites in fill order: "Me" first, then the rest alphabetically.
  const favs = loadContacts().filter(c=>c.fav);
  favs.sort((a,b)=>{
    if(a.me && !b.me) return -1;
    if(b.me && !a.me) return 1;
    return a.name.localeCompare(b.name);
  });
  return favs.slice(0, MAX_FAVORITES);
}

function countFavorites(){ return loadContacts().filter(c=>c.fav).length; }

// Toggle a contact's favorite flag (by name). Enforces the 5-favorite cap.
function toggleFavorite(name){
  const contacts = loadContacts();
  const c = contacts.find(x=>x.name===name);
  if(!c) return;
  if(!c.fav){
    if(contacts.filter(x=>x.fav).length >= MAX_FAVORITES){
      alert(`You can have up to ${MAX_FAVORITES} favorites. Unstar one first.`);
      return;
    }
    c.fav = true;
  } else {
    c.fav = false;
    if(c.me) c.me = false; // un-favoriting also clears the "Me" flag
  }
  saveContacts(contacts);
  renderFavoritesList();
}

// Mark a favorite as "Me" (the scorekeeper). Only one contact can be "Me".
function setMe(name){
  const contacts = loadContacts();
  contacts.forEach(c=>{ c.me = (c.name===name); if(c.me) c.fav = true; });
  saveContacts(contacts);
  renderFavoritesList();
}

// Set a player's default (favorite) tee deck — used to pre-select their deck when favorites load.
function setFavoriteDeck(name, deck){
  const contacts = loadContacts();
  const c = contacts.find(x=>x.name===name);
  if(!c) return;
  c.defaultDeck = deck;
  saveContacts(contacts);
}

// ── Favorites manager overlay ──
function openFavorites(){

      <div class="card" id="favList"></div>

function renderFavoritesList(){
  const box=document.getElementById('favList');

  const contacts = loadContacts().slice().sort((a,b)=>a.name.localeCompare(b.name));
  if(!contacts.length){

    return;
  }
  const favCount = contacts.filter(c=>c.fav).length;
  box.innerHTML = `<div style="font-size:11px;color:#888;margin:0 0 8px">${favCount} of ${MAX_FAVORITES} favorites selected</div>` +
    contacts.map(c=>{
      const dd=c.defaultDeck||'DECK2';
      const opts=DECKS.map(d=>`<option value="${d}"${d===dd?' selected':''}>${d}</option>`).join('');
      const safe=c.name.replace(/'/g,"\\'");
      return `
    <div class="fav-row">
      <button class="fav-star ${c.fav?'on':''}" onclick="toggleFavorite('${safe}')" title="Toggle favorite">${c.fav?'★':'☆'}</button>
      <div class="fav-name">${c.name} <span style="color:#999;font-weight:400">(${c.idx})</span>
        <div class="fav-deck"><span class="fav-deck-lbl">Tee</span>
          <select class="fav-deck-select" onchange="setFavoriteDeck('${safe}', this.value)">${opts}</select></div>
      </div>
      <button class="fav-me ${c.me?'on':''}" onclick="setMe('${safe}')" title="This is me (scorekeeper)">${c.me?'✓ Me':'Me'}</button>
    </div>`;
    }).join('');
}

// Triggered by the "⭐ Load My Favorites" button — gives feedback if none are set.
function loadFavoritesButton(){
  if(!loadFavorites().length){
    alert('No favorites set yet. Tap ⭐ Favorites to star your regular players first.');
    return;
  }
  autofillFavorites(false);
}

// Fill the setup player rows from favorites: "Me" in slot 1, then the rest.
// onlyIfEmpty=true means don't overwrite rows that already have names typed.
function autofillFavorites(onlyIfEmpty){
  const favs = loadFavorites();
  if(!favs.length) return false;
  if(onlyIfEmpty){
    const anyTyped = Array.from({length:5}, (_,i)=>document.getElementById('pn'+i))
      .some(el=>el && el.value.trim()!=='');
    if(anyTyped) return false;
  }
  G.n = Math.min(MAX_FAVORITES, Math.max(2, favs.length));
  document.getElementById('cntVal').textContent=G.n;
  G.players = favs.map(c=>{
    const hasGC = !!c.golfId;
    const deck = c.defaultDeck || 'DECK2';
    return {
      name:c.name,
      golfId:c.golfId||'',
      hdcpFetchedAt:c.hdcpFetchedAt||null,
      deck,
      // Fetched contacts: stored idx is the raw Golf Canada index — apply the player's default deck.
      // Manual contacts: stored idx is the literal handicap (no adjustment).
      hdcpBaseline: hasGC ? c.idx : null,
      idx: hasGC ? deckAdjust(c.idx, deck) : c.idx
    };
  });
  renderPlayers();
  renderAllPairOptions();
  highlightDuplicateRows();
  autoFetchAllStale(); // refresh any stale handicaps in the background (silent)
  return true;
}

function saveContact(i){
  const name = document.getElementById(`pn${i}`).value.trim();
  const idx  = parseFloat(document.getElementById(`ph${i}`).value);
  const golfId = ((document.getElementById(`gid${i}`)||{}).value||'').trim();
  if(!name){ alert('Enter a name first'); return; }
  if(isNaN(idx)){ alert('Enter a handicap first'); return; }
  if(golfId && !/^\d{10}$/.test(golfId)){ alert('Golf Canada ID must be 10 digits'); return; }
  const contacts = loadContacts();
  const exactMatch = contacts.findIndex(c=>c.name.toLowerCase()===name.toLowerCase());

  if(exactMatch>=0){
    // Exact name match — inline confirm to update handicap (confirm() unreliable in iOS PWA)
    showSaveConfirm(i, name, idx, exactMatch, contacts, golfId);
    return;
  }

  // Check for POTENTIAL duplicates (one name contains the other, e.g. "Bruce" vs "Bruce Comeau")
  const potentialDupe = contacts.find(c=>{
    const a=c.name.toLowerCase(), b=name.toLowerCase();
    return a!==b && (a.includes(b) || b.includes(a));
  });
  if(potentialDupe){
    showDuplicateWarning(i, name, idx, potentialDupe, contacts, golfId);
    return;
  }

  contacts.push({name, idx, golfId});
  contacts.sort((a,b)=>a.name.localeCompare(b.name));
  finishSaveContact(i, contacts);
}

// Quietly save/update a contact after a successful Golf Canada lookup (no confirm dialogs).
function autoSaveContact(i){
  const name = ((document.getElementById(`pn${i}`)||{}).value||'').trim();
  const golfId = ((document.getElementById(`gid${i}`)||{}).value||'').trim();
  const p = G.players[i] || {};
  // Store the DECK2 baseline as the contact's index (deck-neutral). For fetched players that's
  // the baseline; for manual players (no baseline) it's the typed value.
  const idx = (p.hdcpBaseline!==undefined && p.hdcpBaseline!==null && !isNaN(p.hdcpBaseline))
    ? p.hdcpBaseline
    : parseFloat((document.getElementById(`ph${i}`)||{}).value);
  if(!name || isNaN(idx)) return; // need at least a name and handicap
  const now = new Date().toISOString();
  const contacts = loadContacts();
  const exact = contacts.findIndex(c=>c.name.toLowerCase()===name.toLowerCase());
  if(exact>=0){
    contacts[exact].idx = idx;
    if(golfId) contacts[exact].golfId = golfId;
    if(golfId) contacts[exact].hdcpFetchedAt = now; // this came from a Golf Canada fetch
  } else {
    contacts.push({name, idx, golfId, hdcpFetchedAt: golfId?now:undefined});
    contacts.sort((a,b)=>a.name.localeCompare(b.name));
  }
  saveContacts(contacts);
  // Stamp it on the in-memory player too, so the timestamp shows immediately.
  if(G.players[i]) G.players[i].hdcpFetchedAt = now;
  refreshContactDropdown(i);
  updateHdcpStamp(i, now);
}

function finishSaveContact(i, contacts){
  saveContacts(contacts);
  // Preserve the current name/idx values, only refresh the dropdown options
  refreshContactDropdown(i);
  const btn=document.getElementById(`savebtn${i}`);
  if(btn){ btn.textContent='✓'; setTimeout(()=>{btn.textContent='💾';},1000); }
}

// Refresh just the saved-players dropdown for row i, without wiping the name/idx inputs
function refreshContactDropdown(i){
  const contacts = loadContacts();
  const contactOpts = contacts.length
    ? `<option value="">— saved players —</option>`+contacts.map(c=>`<option value="${c.name}">${c.name} (${c.idx})</option>`).join('')
    : `<option value="">No saved players</option>`;
  const sel = document.getElementById(`contact${i}`);
  if(sel){ sel.innerHTML = contactOpts; sel.value=''; }
  // Also refresh other rows' dropdowns so the new contact appears everywhere
  for(let j=0;j<5;j++){
    if(j===i) continue;
    const selJ = document.getElementById(`contact${j}`);
    if(selJ){
      const cur=selJ.value;
      selJ.innerHTML = contactOpts;
      selJ.value=cur;
    }
  }
}

// Inline confirmation for updating an existing contact's handicap
function showSaveConfirm(i, name, idx, existingIdx, contacts, golfId){
  removeSaveDialogs(i);
  const row=document.getElementById(`pn${i}`).closest('.p-row');
  const box=document.createElement('div');
  box.id=`saveConfirm${i}`;
  box.className='save-dialog';
  box.innerHTML=`
    <div class="save-dialog-txt">Update <b>${name}</b>'s saved handicap to <b>${idx}</b>?</div>
    <div class="save-dialog-btns">
      <button class="save-dialog-btn yes" onclick="confirmUpdateContact(${i},${existingIdx},${idx},'${golfId||''}')">Update</button>
      <button class="save-dialog-btn no" onclick="removeSaveDialogs(${i})">Cancel</button>
    </div>`;
  row.appendChild(box);
}
function confirmUpdateContact(i, existingIdx, idx, golfId){
  const contacts=loadContacts();
  contacts[existingIdx].idx=idx;
  if(golfId) contacts[existingIdx].golfId=golfId;
  removeSaveDialogs(i);
  finishSaveContact(i, contacts);
}

// Inline warning for potential duplicate (e.g. "Bruce" vs "Bruce Comeau")
function showDuplicateWarning(i, name, idx, potentialDupe, contacts, golfId){
  removeSaveDialogs(i);
  const row=document.getElementById(`pn${i}`).closest('.p-row');
  const box=document.createElement('div');
  box.id=`saveConfirm${i}`;
  box.className='save-dialog save-dialog-warn';
  box.innerHTML=`
    <div class="save-dialog-txt">⚠️ Potential duplicate: you saved a player named <b>${potentialDupe.name}</b> (${potentialDupe.idx}).
      Save <b>${name}</b> (${idx}) as a separate player anyway?</div>
    <div class="save-dialog-btns">
      <button class="save-dialog-btn yes" onclick="confirmSaveDuplicate(${i},'${name.replace(/'/g,"\\'")}',${idx},'${golfId||''}')">Save Anyway</button>
      <button class="save-dialog-btn no" onclick="removeSaveDialogs(${i})">Cancel</button>
    </div>`;
  row.appendChild(box);
}
function confirmSaveDuplicate(i, name, idx, golfId){
  const contacts=loadContacts();
  contacts.push({name, idx, golfId});
  contacts.sort((a,b)=>a.name.localeCompare(b.name));
  removeSaveDialogs(i);
  finishSaveContact(i, contacts);
}
function removeSaveDialogs(i){
  const box=document.getElementById(`saveConfirm${i}`);
  if(box) box.remove();
}
function selectContact(i){
  const sel = document.getElementById(`contact${i}`);
  if(!sel||!sel.value) return;
  const contacts = loadContacts();
  const c = contacts.find(c=>c.name===sel.value);
  if(!c) return;
  document.getElementById(`pn${i}`).value = c.name;
  const gidEl = document.getElementById(`gid${i}`);
  if(gidEl) gidEl.value = c.golfId || '';
  if(!G.players[i]) G.players[i]={};
  G.players[i].name=c.name; G.players[i].golfId=c.golfId||'';
  G.players[i].hdcpFetchedAt=c.hdcpFetchedAt||null;
  // Use the player's saved default tee deck if they have one; otherwise keep the row's deck.
  const deckEl=document.getElementById('deck'+i);
  const wantDeck = c.defaultDeck || (deckEl ? deckEl.value : 'DECK2');
  if(deckEl) deckEl.value = wantDeck;
  G.players[i].deck = wantDeck;
  if(c.golfId){
    // Fetched/Golf-Canada contact: stored idx is the raw index — apply the deck.
    G.players[i].hdcpBaseline = c.idx;
    applyDeckToRow(i);
  } else {
    // Manual contact: use the stored handicap as-is, no deck adjustment.
    G.players[i].hdcpBaseline = null;
    G.players[i].idx = c.idx;
    const phEl=document.getElementById(`ph${i}`); if(phEl) phEl.value = c.idx;
    const adjEl=document.getElementById(`phAdj${i}`); if(adjEl) adjEl.value = c.idx;
    const noteEl=document.getElementById('deckNote'+i); if(noteEl) noteEl.textContent='';
  }
  updateHdcpStamp(i, c.hdcpFetchedAt||null);
  renderAllPairOptions();
  highlightDuplicateRows();
  // Refresh this player's handicap if it's stale (silent — no prompts/errors).
  autoFetchIfStale(i);
}
function deleteContact(name){
  const contacts = loadContacts().filter(c=>c.name!==name);
  saveContacts(contacts);
  harvestPlayerInputs();
  renderPlayers();
}

<script>
// Inline service worker for PWA offline support
if('serviceWorker' in navigator){
  const swCode = `
const CACHE='nassau-v16.2';
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>c.addAll(['./','help.html','gc_id.jpg']))
    .then(()=>self.skipWaiting())
  );
});
self.addEventListener('activate',e=>{
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      const clone=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone));
      return res;
    }))
  );
});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register(swUrl)
      .then(()=>console.log('SW ready'))
      .catch(e=>console.log('SW failed',e));
  });
}
</script>
