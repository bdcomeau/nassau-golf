/* ═══════════════════════════════════════════════
   NET SCORE HELPERS
═══════════════════════════════════════════════ */
// Calculate strokes per hole for a player given their playing handicap in a specific match
function matchStrokes(playHdcp){
  return G.si.map(si=>{
    if(playHdcp>=si+18) return 2;
    if(playHdcp>=si)    return 1;
    return 0;
  });
}

// Get match-specific playing handicaps for a set of player indexes
function matchPlayHdcps(playerIdxs){
  const idxs = playerIdxs.map(i=>G.players[i].idx);
  const minIdx = Math.min(...idxs);
  return playerIdxs.map(i=>Math.round(G.players[i].idx - minIdx));
}

function netS(pi,h){const g=G.scores[pi][h];return g===null?null:g-G.players[pi].strokes[h];}

// Match-specific net score: uses strokes calculated off lowest handicap in this match
function matchNetS(pi, h, playHdcp){
  const g=G.scores[pi][h];
  if(g===null) return null;
  const si=G.si[h];
  let stk=0;
  if(playHdcp>=si+18) stk=2;
  else if(playHdcp>=si) stk=1;
  return g-stk;
}

function sideNet(idxs,h,ball){
  const nets=idxs.map(i=>netS(i,h)).filter(n=>n!==null);
  if(!nets.length)return null;
  return ball==='low'?Math.min(...nets):Math.max(...nets);
}

// Match-specific sideNet using per-match playing handicaps
function matchSideNet(idxs, playHdcps, h, ball){
  const nets=idxs.map((pi,ii)=>matchNetS(pi,h,playHdcps[ii])).filter(n=>n!==null);
  if(!nets.length) return null;
  return ball==='low'?Math.min(...nets):Math.max(...nets);
}

/* ═══════════════════════════════════════════════
   SCORE STYLING
═══════════════════════════════════════════════ */
function scoreClass(gross,par,strokes){
  const net=gross-strokes, toPar=net-par;
  if(toPar<=-2)return{box:'eagle',lbl:'Eagle',lblCls:'eagle-lbl'};
  if(toPar===-1)return{box:'birdie',lbl:'Birdie',lblCls:'birdie-lbl'};
  if(toPar===0)return{box:'par-score',lbl:'Par',lblCls:'par-lbl'};
  if(toPar===1)return{box:'bogey',lbl:'Bogey',lblCls:'bogey-lbl'};
  if(toPar===2)return{box:'double',lbl:'Double',lblCls:'double-lbl'};
  if(toPar>=3)return{box:'triple',lbl:`+${toPar}`,lblCls:'triple-lbl'};
  return{box:'',lbl:'',lblCls:'other-lbl'};
}

/* ═══════════════════════════════════════════════
   NASSAU ENGINE  (verified: $74 for lose-every-hole)
═══════════════════════════════════════════════ */
function holeResult(matchup,playIdx){
  // Translate play-order index (0-17, i.e. 1st-18th hole played) to the actual
  // hole array index, accounting for shotgun starts (G.startHole).
  const h = actualHoleIdx(playIdx);
  const allPlayers=[...matchup.sideA,...matchup.sideB];
  if(allPlayers.some(i=>G.scores[i][h]===null))return null;

  // Calculate playing handicaps specific to this matchup's players
  const phA = matchPlayHdcps(matchup.sideA);
  const phB = matchPlayHdcps(matchup.sideB);
  // Combined for full match (all 4 players zeroed off lowest in match)
  const allIdxs = [...matchup.sideA,...matchup.sideB];
  const allPh   = matchPlayHdcps(allIdxs);
  const phAFull = allPh.slice(0, matchup.sideA.length);
  const phBFull = allPh.slice(matchup.sideA.length);

  if(matchup.type==='2v2-combined'){
    const aHi=matchSideNet(matchup.sideA,phAFull,h,'high');
    const bHi=matchSideNet(matchup.sideB,phBFull,h,'high');
    const aLo=matchSideNet(matchup.sideA,phAFull,h,'low');
    const bLo=matchSideNet(matchup.sideB,phBFull,h,'low');
    return (aHi<bHi?1:bHi<aHi?-1:0)+(aLo<bLo?1:bLo<aLo?-1:0);
  }
  // 1v1: zero off lowest of the two players
  const ph1v1 = matchPlayHdcps([...matchup.sideA,...matchup.sideB]);
  const a=matchNetS(matchup.sideA[0],h,ph1v1[0]);
  const b=matchNetS(matchup.sideB[0],h,ph1v1[1]);
  if(a===null||b===null) return null;
  return a<b?1:b<a?-1:0;
}

function computeMatchGames(matchup){
  const base     = matchup.bet || G.bet || 2;
  const pressVal = base * 2;
  const games    = [];

  function scoreRange(startH, endH){
    let score=0, pressH=null;
    for(let h=startH; h<=endH; h++){
      const r = holeResult(matchup, h);
      if(r === null) break;
      score += r;
      if(pressH === null && Math.abs(score) >= 2 && h < endH) pressH = h;
    }
    let holesPlayed=0;
    for(let h=startH;h<=endH;h++){ if(holeResult(matchup,h)===null) break; holesPlayed++; }
    const holesLeft = (endH - startH + 1) - holesPlayed;
    const settled   = holesLeft === 0 || Math.abs(score) > holesLeft;
    const winner    = settled ? (score>0?'A':score<0?'B':'tie') : null;
    return {score, pressH, holesPlayed, holesLeft, settled, winner};
  }

  function addGame(startH, endH, value, label, isPress, frontLeg){
    // Presses are "declared" on startH (the hole shown as 'P') and begin SCORING on startH+1.
    const scoreStart = isPress ? startH+1 : startH;
    const g = scoreRange(scoreStart, endH);
    // For front-nine presses, store both legs and combine settlement
    if(frontLeg){
      // BOTH legs read the press's CUMULATIVE margin:
      //   leg 1 = cumulative standing at hole 9 (scoreStart → 8)
      //   leg 2 = cumulative standing at hole 18 (scoreStart → endH) — full press margin, not just the back nine
      const leg9  = scoreRange(scoreStart, 8);
      const leg18 = scoreRange(scoreStart, endH);
      const pay9  = leg9.settled  ? (leg9.score>0?base:leg9.score<0?-base:0) : 0;
      const pay18 = leg18.settled ? (leg18.score>0?base:leg18.score<0?-base:0) : 0;
      const combined = pay9 + pay18;
      const fullRun = leg18; // running display uses the full cumulative margin
      const combinedWinner = combined>0?'A':combined<0?'B': ((leg9.settled&&leg18.settled)?'tie':null);
      games.push({label, startH, endH:17, value:pressVal, isPress:true,
                  score:fullRun.score, holesPlayed:fullRun.holesPlayed,
                  settled:(leg9.settled&&leg18.settled), winner:combinedWinner,
                  isFrontPress:true, leg9, leg18, combinedPay:combined});
      return fullRun.pressH;
    }
    games.push({label, startH, endH, value, isPress,
                score:g.score, holesPlayed:g.holesPlayed,
                settled:g.settled, winner:g.winner, isFrontPress:false});
    return g.pressH;
  }

  // ── 3 original bets ──
  addGame(0,  8, base, 'Front 9',  false, false);
  addGame(9, 17, base, 'Back 9',   false, false);
  addGame(0, 17, base, 'Full 18',  false, false);

  // ── Press chain off Full 18 ──
  // A press is DECLARED on the hole where its parent first reaches ±2 (that hole shows 'P'),
  // and starts SCORING the following hole. So startH = parentTrigger (the ±2 hole itself).
  const fullGame    = scoreRange(0, 17);
  let chainPressH   = fullGame.pressH;  // play-idx where Full-18 first hit ±2
  let pNum          = 1;

  while(chainPressH !== null){
    const ps = chainPressH;   // the press's 'P' / declaration hole = the trigger hole
    if(ps+1 > 17) break;      // need at least one hole after to score
    // Front-nine press if its first COUNTED hole (ps+1) is within the first 9 played
    const frontPress = (ps+1) <= 8;
    chainPressH = addGame(ps, 17, pressVal, `Press ${pNum} H${ps+2}–18`, true, frontPress);
    pNum++;
  }

  return games;
}

/* ═══════════════════════════════════════════════
   THE INTERNATIONAL
═══════════════════════════════════════════════ */
// Computes the games as they stand after exactly 17 holes (H18 treated as unplayed),
// splitting front-nine presses into their settled leg9 and live leg18 portions.
// Returns { guarantee, largePress, internationalee, games17 } or null if H17 isn't complete.

// ── The Big I (International) — re-enabled with the finalized rules. ──
// Set INTERNATIONAL_ENABLED to false to hide all International functionality.
const INTERNATIONAL_ENABLED = true;

function computeInternational(matchup){
  if(!INTERNATIONAL_ENABLED) return null;
  const base     = matchup.bet || G.bet || 2;
  const pressVal = base * 2;

  // holeResult17: same as holeResult but treats H18 (index 17) as unplayed
  function holeResult17(h){
    if(h===17) return null;
    return holeResult(matchup, h);
  }

  function scoreRange17(startH, endH){
    let score=0, pressH=null, holesPlayed=0;
    for(let h=startH; h<=endH; h++){
      const r = holeResult17(h);
      if(r === null) break;
      score += r;
      holesPlayed++;
      if(pressH === null && Math.abs(score) >= 2 && h < endH) pressH = h;
    }
    const holesLeft = (endH - startH + 1) - holesPlayed;
    const settled   = holesLeft === 0 || Math.abs(score) > holesLeft;
    return {score, pressH, holesPlayed, holesLeft, settled};
  }

  // Check 17 holes (in PLAY order) are fully scored; H18-of-match (play index 17) is the decider.
  for(let h=0; h<=16; h++){
    if(holeResult(matchup,h)===null) return null;
  }

  // ── Build the game list from computeMatchGames so the press structure is IDENTICAL ──
  // computeMatchGames already chains presses correctly. Before the 18th hole of the match
  // is scored, each game's running score reflects the through-17 state. We derive the
  // through-17 margin for each game directly from it (front presses split into leg9/leg18).
  const liveGames = computeMatchGames(matchup);

  // Helper: margin of a game over a play-order range, treating H18-of-match (idx17) as unplayed.
  function rangeScore17(startH, endH){
    let score=0;
    for(let h=startH; h<=endH && h<=16; h++){
      const r = holeResult(matchup, h);
      if(r === null) break;
      score += r;
    }
    return score;
  }

  const games17 = liveGames.map(g=>{
    // Presses score from the hole AFTER their 'P' (startH) hole.
    const pressScoreStart = g.startH + 1;
    if(g.isFrontPress){
      return {
        label:g.label, startH:g.startH, endH:g.endH, value:g.value,
        isPress:true, isFrontPress:true,
        // leg9 = cumulative at hole 9; leg18 = cumulative through 17 (full press margin so far)
        leg9:  { score: rangeScore17(pressScoreStart, 8) },
        leg18: { score: rangeScore17(pressScoreStart, 16) },
      };
    }
    return {
      label:g.label, startH:g.startH, endH:g.endH, value:g.value,
      isPress:g.isPress, isFrontPress:false,
      score: rangeScore17(g.isPress ? pressScoreStart : g.startH, Math.min(g.endH,17)),
    };
  });

  // ── Determine who is DOWN MONEY through 17 holes ──
  // Total each side's provisional standing: every game at its current-through-17 margin,
  // counted at its stake if non-zero (front-press legs counted separately).
  // The net-negative side is the LOSING side and the only one who may call it.
  let netToA = 0; // positive = side A is up money through 17
  games17.forEach(g=>{
    if(g.isFrontPress){
      if(g.leg9.score>0) netToA += base; else if(g.leg9.score<0) netToA -= base;
      if(g.leg18.score>0) netToA += base; else if(g.leg18.score<0) netToA -= base;
    } else {
      const v = g.value;
      if(g.score>0) netToA += v; else if(g.score<0) netToA -= v;
    }
  });

  // Perfectly even on money — nobody is down, International unavailable
  if(netToA === 0) return null;

  // The losing side (down money) is the internationaler who may CALL it.
  const callerSide = netToA > 0 ? 'B' : 'A';   // side that is DOWN money

  // ── Bucket the NON-PROTECTED games into the Big I pot ──
  // Bucketing rule:
  //  • FRONT-NINE pieces — the Nassau Front 9, and the front leg (judged at hole 9) of any
  //    press started on the front nine — go into the pot whenever they are NOT EVEN (anyone
  //    ahead, even by one). They are protected only when dead even. The protected-band cushion
  //    does NOT apply to these.
  //  • Everything else (Back 9, Total 18, back-nine presses, and the back leg of a front press)
  //    keeps the normal band rule: protected if its margin is inside the band, otherwise bundled.
  // Bands: 2v2 -2..+2 (bundle if |>=3|) ; 1v1 -1..+1 (bundle if |>=2|).
  const threshold = (matchup.type === '2v2-combined') ? 3 : 2;

  let nonProtectedNetToA = 0;       // signed net of every bundled game/leg (A perspective)
  const bucketedLabels = new Set(); // labels (or 'label#leg9' / 'label#leg18') excluded from normal settlement

  games17.forEach(g=>{
    if(g.isFrontPress){
      // Front leg (judged at hole 9) — bundled whenever it is NOT EVEN.
      if(g.leg9.score !== 0){
        nonProtectedNetToA += g.leg9.score>0 ? base : -base;
        bucketedLabels.add(g.label+'#leg9');
      }
      // Back leg (through 17) — normal band rule.
      if(Math.abs(g.leg18.score) >= threshold){
        nonProtectedNetToA += g.leg18.score>0 ? base : -base;
        bucketedLabels.add(g.label+'#leg18');
      }
    } else if(g.label === 'Front 9'){
      // Nassau Front 9 — bundled whenever it is NOT EVEN (no band cushion).
      if(g.score !== 0){
        nonProtectedNetToA += g.score>0 ? g.value : -g.value;
        bucketedLabels.add(g.label);
      }
    } else {
      // B9, Full 18, back-nine presses — normal band rule (bundle if margin is out of band).
      if(Math.abs(g.score) >= threshold){
        nonProtectedNetToA += g.score>0 ? g.value : -g.value;
        bucketedLabels.add(g.label);
      }
    }
  });

  // The pot is the NET difference between the sides on the non-protected games.
  const largePress = Math.abs(nonProtectedNetToA);

  // No money outside the band (and no front-nine games) — nothing to International
  if(largePress === 0) return null;

  // Leader of the Big I = the side UP money overall through 17 (always well-defined).
  const leaderSign = netToA>0 ? 1 : netToA<0 ? -1 : 0;  // +1 = side A leads, -1 = side B leads

  return {
    largePress,                 // the Big I pot = net of non-protected games
    leaderSign,                 // +1 = side A leads, -1 = side B leads
    nonProtectedNetToA,         // signed net of non-protected games (A perspective)
    bucketedLabels,             // games excluded from normal settlement (their value is in the pot)
    callerSide,                 // 'A' or 'B' — the team DOWN money after 17 (the Trailers)
    internationaleeSide: callerSide,
    internationaleeIdx: callerSide==='A' ? matchup.sideA : matchup.sideB,
    internationalerIdx: callerSide==='A' ? matchup.sideB : matchup.sideA,
    games17,
    netToA,                     // money standing through 17 (A perspective)
  };
}

// Settle the large press once H18 is scored.
// The CALLER (losing side, down money through 17) wins the press if they win hole 18
// (any non-zero margin in their favour = at least one point). Halve on 18 = push.
// Returns { largePressNetToInternationalee, h18Result } or null if H18 not yet scored.
function settleInternational(matchup, intl){
  const h18 = holeResult(matchup, 17);
  if(h18 === null) return null;

  // h18 is from sideA's perspective. Convert to the caller's perspective.
  const h18ForIntee = intl.internationaleeSide==='A' ? h18 : -h18;
  const sign = h18ForIntee>0 ? 1 : h18ForIntee<0 ? -1 : 0;

  const largePressNetToInternationalee = sign*intl.largePress;
  return { largePressNetToInternationalee, h18Result: h18ForIntee };
}

/* ═══════════════════════════════════════════════
   6-POINT GAME ENGINE
═══════════════════════════════════════════════ */
// Computes per-hole point distribution and running totals for a 6-Point game.
// game = {players:[i,i,i], perPoint:N}
// Returns {pointsPerHole: [[p1,p2,p3],...18], running: [[cum1,cum2,cum3],...18],
//          totals:[t1,t2,t3], holesPlayed, settlement:{...} or null}
function computeSixPoint(game){
  const [pA,pB,pC] = game.players;
  const idxs=[pA,pB,pC];

  // Lowest handicap among the 3 drops to zero; the other two adjust off of that
  // (same match-specific zeroing as the Nassau matches use).
  const playHdcps = matchPlayHdcps(idxs);
  const strokes = playHdcps.map(hi=>{
    return G.si.map(si=>{
      if(hi>=si+18) return 2;
      if(hi>=si) return 1;
      return 0;
    });
  });

  const pointsPerHole=[], running=[];
  let cum=[0,0,0];
  let holesPlayed=0;

  for(let h=0;h<18;h++){
    const grosses = idxs.map(pi=>G.scores[pi][h]);
    if(grosses.some(g=>g===null)){
      pointsPerHole.push(null);
      running.push([...cum]);
      continue;
    }
    holesPlayed++;
    const nets = grosses.map((g,ii)=>g-strokes[ii][h]);
    const minNet=Math.min(...nets);
    const countAtMin=nets.filter(n=>n===minNet).length;
    let pts;
    if(countAtMin===3) pts=[2,2,2];
    else if(countAtMin===2) pts=nets.map(n=>n===minNet?3:0);
    else pts=nets.map(n=>n===minNet?6:0);

    pointsPerHole.push(pts);
    cum=[cum[0]+pts[0], cum[1]+pts[1], cum[2]+pts[2]];
    running.push([...cum]);
  }

  const totals=cum;
  let settlement=null;
  if(holesPlayed===18){
    // Rank players by points (descending). Ties split evenly among tied players for that rank's payments.
    const ranked = idxs.map((pi,ii)=>({pi, pts:totals[ii]})).sort((a,b)=>b.pts-a.pts);
    const money = idxs.map(()=>0);
    const idxOf = pi => idxs.indexOf(pi);

    // Standard (no ties) settlement: 2nd pays 1st, 3rd pays 2nd & 1st
    // For ties, split payment differences proportionally — simplest correct approach:
    // for every pair (i,j) with i ranked above j, j pays i (pts_i - pts_j)*perPoint (0 if tied)
    for(let i=0;i<3;i++){
      for(let j=i+1;j<3;j++){
        const diff = (ranked[i].pts - ranked[j].pts) * game.perPoint;
        if(diff>0){
          money[idxOf(ranked[i].pi)] += diff;
          money[idxOf(ranked[j].pi)] -= diff;
        }
      }
    }
    settlement = { money, ranked: ranked.map(r=>({pi:r.pi, pts:r.pts})) };
  }

  return { pointsPerHole, running, totals, holesPlayed, settlement, strokes, players:idxs };
}

function buildMatchups(){
  const m=[];
  G.teamGames.forEach((g,i)=>{
    const nA=G.players[g.a[0]].name+' & '+G.players[g.a[1]].name;
    const nB=G.players[g.b[0]].name+' & '+G.players[g.b[1]].name;
    m.push({type:'2v2-combined',sideA:g.a,sideB:g.b,labelA:nA,labelB:nB,bet:g.bet,matchId:'team'+i});
  });
  G.singleGames.forEach((s,i)=>{
    m.push({type:'1v1',sideA:[s.p1],sideB:[s.p2],labelA:G.players[s.p1].name,labelB:G.players[s.p2].name,bet:s.bet,matchId:'single'+i});
  });
  return m;
}

/* ═══════════════════════════════════════════════
   WHAT-IF NASSAU (scorecard-only mode, post-round)
   Computes what a hypothetical Nassau matchup would have paid,
   using the real scores and the full engine (F9/B9/18 + auto presses).
═══════════════════════════════════════════════ */
let _whatIfBet = 2; // global default $/side, user-adjustable

// Net result to Side A for a hypothetical matchup (positive = Side A up). Includes presses.
function whatIfNetToA(sideA, sideB, bet){
  const type = sideA.length===2 ? '2v2-combined' : '1v1';
  const m = { type, sideA, sideB,
    labelA: sideA.map(i=>G.players[i].name).join(' & '),
    labelB: sideB.map(i=>G.players[i].name).join(' & '),
    bet, matchId:'whatif' };
  let net=0;
  computeMatchGames(m).forEach(g=>{
    if(g.isFrontPress){
      const pay9  = g.leg9.settled  ? (g.leg9.score>0?bet:g.leg9.score<0?-bet:0) : 0;
      const pay18 = g.leg18.settled ? (g.leg18.score>0?bet:g.leg18.score<0?-bet:0) : 0;
      net += pay9 + pay18;
    } else if(g.settled && g.winner!=='tie'){
      net += g.winner==='A' ? g.value : -g.value;
    }
  });
  return net;
}

// All hypothetical matchups for the current players: every 1v1, plus every 2v2 split when n===4.
function whatIfMatchups(){
  const n = G.players.length;
  const out = [];
  // 1v1: all pairs
  for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
    out.push({ kind:'1v1', a:[i], b:[j] });
  }
  // 2v2: only clean with exactly 4 players → 3 distinct splits
  if(n===4){
    const splits=[ [[0,1],[2,3]], [[0,2],[1,3]], [[0,3],[1,2]] ];
    splits.forEach(s=> out.push({ kind:'2v2', a:s[0], b:s[1] }));
  }
  return out;
}

function openWhatIf(){
  const existing=document.getElementById('whatIfOverlay');
  if(existing) existing.remove();
  const overlay=document.createElement('div');
  overlay.className='mm-overlay';
  overlay.id='whatIfOverlay';
  overlay.innerHTML=`
    <div class="mm-sheet">
      <div class="mm-hdr">
        <div class="mm-title">🤔 What If — Nassau</div>
        <button class="mm-close" onclick="document.getElementById('whatIfOverlay').remove()">Done</button>
      </div>
      <div style="font-size:12px;color:#666;margin:0 0 10px">Based on today's scores, here's what each matchup would have paid if you'd played a Nassau (Front 9 / Back 9 / Total 18, with automatic presses). Just for fun — no money changed hands!</div>
      <div class="card" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:14px;font-weight:700;color:#222">$ per side</div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="wi-step" onclick="whatIfBet(-1)">−</button>
          <div id="wiBetVal" style="font-size:18px;font-weight:800;color:var(--gm);min-width:42px;text-align:center">$${_whatIfBet}</div>
          <button class="wi-step" onclick="whatIfBet(1)">+</button>
        </div>
      </div>
      <div id="whatIfBody"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });

}

function whatIfBet(delta){
  _whatIfBet = Math.max(1, _whatIfBet + delta);
  const v=document.getElementById('wiBetVal'); if(v) v.textContent='$'+_whatIfBet;
  renderWhatIfBody();
}

function renderWhatIfBody(){
  const body=document.getElementById('whatIfBody');
  if(!body) return;
  const bet=_whatIfBet;
  const mus=whatIfMatchups();
  const twoV2 = mus.filter(x=>x.kind==='2v2');
  const oneV1 = mus.filter(x=>x.kind==='1v1');

  function card(x){
    const net = whatIfNetToA(x.a, x.b, bet);
    const aNames = x.a.map(i=>G.players[i].name).join(' & ');
    const bNames = x.b.map(i=>G.players[i].name).join(' & ');
    let line, col;
    if(net>0){ line=`${aNames} win${x.kind==='2v2'?'':'s'} $${net}`; col='var(--gm)'; }
    else if(net<0){ line=`${bNames} win${x.kind==='2v2'?'':'s'} $${Math.abs(net)}`; col='var(--gm)'; }
    else { line='All square — $0'; col='var(--inkl)'; }
    return `<div class="wi-match">
      <div class="wi-vs"><b>${aNames}</b><span>vs</span><b>${bNames}</b></div>
      <div class="wi-res" style="color:${col}">${line}</div>
    </div>`;
  }

  let html='';
  if(twoV2.length){
    html+=`<div class="slabel">2v2 (High-Low)</div>`;
    html+=twoV2.map(card).join('');
  }
  html+=`<div class="slabel" style="margin-top:16px">1v1</div>`;
  html+=oneV1.map(card).join('');
  body.innerHTML=html;
}

function computeMoney(){
  const money=G.players.map(()=>0);
  buildMatchups().forEach(m=>{
    const intlActive = (G.internationals||{})[m.matchId];
    let intl = null, bucketed = null;

    if(intlActive){
      intl = computeInternational(m);
      if(intl) bucketed = intl.bucketedLabels;
    }

    // Settle every game normally EXCEPT ones bucketed into the large press
    computeMatchGames(m).forEach(g=>{
      if(!g.settled||g.winner==='tie')return;

      if(bucketed){
        if(g.isFrontPress){
          // leg9 (front) and leg18 (back) each settle normally UNLESS bucketed into the pot
          if(!bucketed.has(g.label+'#leg9') && g.leg9.settled && g.leg9.score!==0){
            const amt9=base_(m);
            const wi=g.leg9.score>0?m.sideA:m.sideB, li=g.leg9.score>0?m.sideB:m.sideA;
            wi.forEach(i=>money[i]+=amt9); li.forEach(i=>money[i]-=amt9);
          }
          if(!bucketed.has(g.label+'#leg18') && g.leg18.settled && g.leg18.score!==0){
            const amt18=base_(m);
            const wi=g.leg18.score>0?m.sideA:m.sideB, li=g.leg18.score>0?m.sideB:m.sideA;
            wi.forEach(i=>money[i]+=amt18); li.forEach(i=>money[i]-=amt18);
          }
          return;
        } else if(bucketed.has(g.label)){
          return; // this game's value moved into the large press — skip normal settlement
        }
      }

      const amt = g.isFrontPress ? Math.abs(g.combinedPay||0) : g.value;
      const wi=g.winner==='A'?m.sideA:m.sideB, li=g.winner==='A'?m.sideB:m.sideA;
      wi.forEach(i=>money[i]+=amt);
      li.forEach(i=>money[i]-=amt);
    });

    // The International (if active): double-or-nothing, settled relative to the LEADER
    // via intlNetToA (leader wins 18 -> 2x pot; halve/draw -> 1x pot; trailer wins 18 -> pot void).
    if(intl){
      const netA = intlNetToA(m, intl);
      m.sideA.forEach(i=>money[i]+=netA);
      m.sideB.forEach(i=>money[i]-=netA);
    }
  });
  return money;
}
function base_(m){ return m.bet || G.bet || 2; }

// Big I net to side A given the hole-18 result. Settlement is based on the LEADERS'
// net points on the 18th hole (holeResult gives +/-2/+/-1/0 for 2v2, +/-1/0 for 1v1):
//   Leaders net POSITIVE on 18  -> Leaders win 2x pot   (the "double")
//   Leaders net ZERO (draw)     -> Leaders win 1x pot
//   Trailers net POSITIVE on 18 -> pot is VOID, nobody collects it  (the "nothing")
//   H18 unscored                -> provisional 1x pot to Leaders (the draw standing)
// Returned signed to side A (positive = side A gains).
function intlNetToA(m, intl){
  if(!intl) return 0;
  const L = intl.leaderSign;            // +1 = A leads, -1 = B leads
  if(L===0) return 0;
  const pot = intl.largePress;
  const h18 = holeResult(m, 17);        // net points on 18, A perspective (2v2: +/-2/+/-1/0)

  // Leaders' net points on 18 (convert A-perspective result to the leader's perspective)
  const leaderPts = (h18===null) ? 0 : (L>0 ? h18 : -h18);

  let toLeader;
  if(leaderPts > 0)      toLeader = 2*pot;   // Leaders won the hole on points -> 2x (double)
  else if(leaderPts < 0) toLeader = 0;       // Trailers won the hole -> pot is void, nobody collects (nothing)
  else                   toLeader = pot;      // draw (or unscored) -> Leaders hold 1x

  // Convert "to leader" into "to side A"
  return L>0 ? toLeader : -toLeader;
}

function fmt(v){return v===0?'$0':(v>0?'+$':'-$')+Math.abs(v).toFixed(2).replace(/\.00$/,'');}

/* ═══════════════════════════════════════════════
   SCORE WHEEL — tap +/- to adjust, swipe to scroll
═══════════════════════════════════════════════ */
function adjustScore(pi, h, delta){
  const cur=G.scores[pi][h];
  // If unset, start from par and apply delta in one step
  const next = cur===null ? G.par[h]+delta : cur+delta;
  if(next<1||next>15)return;
  const prev=G.scores[pi][h];
  G.scores[pi][h]=next;
  checkBirdieJuice(pi,h,prev);
  saveG();
  renderCard();
  maybeAutoAdvance();
}

// Auto-advance to the next hole once every player has a score on the current hole.
// Never advances past the final hole of the round (holes 1–17 only; stays on 18).
function maybeAutoAdvance(){
  const curPlay = playOrderIdx(G.hole);
  if(curPlay >= 17) return;                 // last hole of the round — never auto-advance
  // All players must have a score on the current hole
  if(G.players.some((_,pi)=>G.scores[pi][G.hole]===null)) return;
  clearTimeout(maybeAutoAdvance._t);
  maybeAutoAdvance._t = setTimeout(()=>{
    const cp = playOrderIdx(G.hole);
    if(cp >= 17) return;                     // re-check: last hole
    // Re-check all scores present in case one was edited back to empty during the delay
    if(G.players.some((_,pi)=>G.scores[pi][G.hole]===null)) return;
    // Move directly to the next hole. We've already confirmed every score is in,
    // so skip the manual missing-score guard (avoids a false warning if a manual
    // tap races with this timer). Also clear any stale warning banner.
    const err=document.getElementById('holeErr'); if(err) err.style.display='none';
    G.hole = actualHoleIdx(cp + 1);
    saveG(); renderCard();
  }, 550);
}

// Score type helper — returns null (no juice), 'birdie', 'eagle', or 'hole-in-one'
function birdieJuiceType(gross, par){
  if(gross===null) return null;
  if(gross===1) return 'hole-in-one';          // always, regardless of par
  const toPar=gross-par;
  if(toPar<=-2) return 'eagle';
  if(toPar===-1) return 'birdie';
  return null;
}
// Credits awarded per score type
const BJ_CREDITS={birdie:1, eagle:2, 'hole-in-one':5};

// Called after any score change. Logs/un-logs entries and shows appropriate popup.
function checkBirdieJuice(pi, h, prevGross){
  if(!G.birdieJuice) G.birdieJuice={earned:[],redeemed:0};
  const par=G.par[h];
  const newGross=G.scores[pi][h];
  const wasType = birdieJuiceType(prevGross, par);
  const isType  = birdieJuiceType(newGross, par);

  // Remove any existing entry for this pi+h (handles changes between types too)
  if(wasType){
    const oldCredits=BJ_CREDITS[wasType];
    let removed=0;
    G.birdieJuice.earned=G.birdieJuice.earned.filter(e=>{
      if(e.pi===pi && e.h===h && removed<oldCredits){ removed++; return false; }
      return true;
    });
  }

  if(isType){
    // Push one entry per credit awarded (so remaining = earned.length - redeemed stays simple)
    const credits=BJ_CREDITS[isType];
    for(let i=0;i<credits;i++){
      G.birdieJuice.earned.push({pi, h, actualHole:h+1, playerName:G.players[pi].name, type:isType, credit:i+1, credits});
    }
    if(isType==='hole-in-one'){
      showHoleInOnePopup(G.players[pi].name, h+1);
    } else if(isType==='eagle'){
      showEaglePopup(G.players[pi].name, h+1, newGross, par);
    } else {
      showBirdieJuicePopup(G.players[pi].name, h+1);
    }
  }
  updateBirdieJuiceBadge();
}

// Updates the small badge on the bottom-nav Birdie Juice icon to show remaining credits

  if(!G.birdieJuice) G.birdieJuice={earned:[],redeemed:0};
  const remaining=G.birdieJuice.earned.length - G.birdieJuice.redeemed;
  const badge=document.getElementById('bjBadge');
  if(!badge) return;
  if(remaining>0){
    badge.textContent=remaining;
    badge.style.display='flex';
  } else {
    badge.style.display='none';
  }
}

function renderMatchScorecard(m){
  const allPi=[...m.sideA,...m.sideB];
  const is2v2=m.type==='2v2-combined';

  // Compute match running scores hole by hole
  // games = computeMatchGames gives us the press structure (in PLAY ORDER, 0-17)
  const games=computeMatchGames(m);

  // Always show all 18 holes, regardless of how many have been played
  const hasBack=true;
  const activeGames=games;

  function buildCard(){
    let tbl=`<table class="msc">`;

    // Match-specific playing handicaps for all players in this matchup
    const allIdxs=[...m.sideA,...m.sideB];
    const allPh=matchPlayHdcps(allIdxs);
    // Map from allPi index to playing handicap
    const matchPh=allPi.map(pi=>allPh[allIdxs.indexOf(pi)]);

    // ── Pre-compute per-hole running score for each game ──
    // Indexed by PLAY ORDER (0-17, i.e. 1st-18th hole played) — matches computeMatchGames'
    // game.startH/endH which are also in play-order space.
    const gameRunScores = activeGames.map(g=>{
      const arr = Array(18).fill(null);
      let cum = 0;
      for(let playIdx=g.startH; playIdx<=g.endH; playIdx++){
        const r = holeResult(m, playIdx);
        if(r===null) break; // not scored yet
        cum += r;
        arr[playIdx] = cum;
      }
      return arr;
    });

    // ── Header row ──
    tbl+=`<thead><tr><td class="row-lbl par" style="text-align:center">Hole</td><td class="hdr-tot">HCP</td>`;
    allPi.forEach((pi,ii)=>{
      const p=G.players[pi];
      tbl+=`<td class="hdr-name">${p.name}<br><span style="font-size:8px;font-weight:400">Idx ${p.idx.toFixed(1)} (${matchPh[ii]})</span></td>`;
    });
    tbl+=`<td class="nine-sep" style="padding:0;width:0;border-left:2px solid var(--gl)"></td>`;
    activeGames.forEach(g=>{
      // Label: Frt / Bck / 18 for originals, press number for presses
      const pressGames = activeGames.filter(g=>g.isPress);
      const pressIdx = pressGames.indexOf(g);
      const lbl = !g.isPress
        ? (g.endH<=8 ? 'Frt' : g.startH>=9 ? 'Bck' : '18')
        : `P${pressIdx+1}`;
      tbl+=`<td class="hdr-match nine-sep">${lbl}<br><span style="font-size:8px">$${g.value}</span></td>`;
    });
    tbl+='</tr></thead><tbody>';

    // ── Par row ──
    tbl+=`<tr><td class="row-lbl par">Par</td><td class="tot" style="background:var(--gp)"></td>`;
    allPi.forEach(()=>tbl+=`<td class="sc" style="background:var(--gp);font-weight:700"></td>`);
    tbl+=`<td class="nine-sep" style="padding:0;width:0;border-left:2px solid var(--gl)"></td>`;
    activeGames.forEach(()=>tbl+=`<td class="ms blank"></td>`);
    tbl+='</tr>';

    // ── Hole rows: 1st-18th holes PLAYED (handles shotgun starts) ──
    const gross=allPi.map(()=>0), scored=allPi.map(()=>false);
    const bGross=allPi.map(()=>0), bScored=allPi.map(()=>false);
    let fPar=0, bPar=0;

    for(let playIdx=0; playIdx<(hasBack?18:9); playIdx++){
      const h=actualHoleIdx(playIdx); // actual hole array index for par/SI/scores
      const parVal = G.par[h];
      if(playIdx<9) fPar+=parVal; else bPar+=parVal;
      tbl+=`<tr><td class="row-lbl" style="font-weight:700;text-align:center;font-size:11px">${h+1}<br><span style="font-size:8px;font-weight:400;color:#999">${parVal}</span></td>`;

      // HCP col — show stroke index for this hole, right after the Hole column
      tbl+=`<td class="tot" style="background:#f5f5f5;color:#666;font-size:10px">${G.si[h]}</td>`;

      // Player score cells
      allPi.forEach((pi,ii)=>{
        const g=G.scores[pi][h];
        const s=matchStrokes(matchPh[ii])[h]; // match-specific strokes (indexed by actual hole)
        if(g!==null){
          if(playIdx<9){gross[ii]+=g;scored[ii]=true;}
          else{bGross[ii]+=g;bScored[ii]=true;}
        }
        const inner=g!==null
          ?(s>=2?`<span class="circ-val c2">${g}</span>`
            :s>=1?`<span class="circ-val">${g}</span>`
            :`${g}`)
          // Not yet played — show empty circle outline if this hole has a stroke
          :(s>=2?`<span class="circ-val c2" style="color:#ccc"></span>`
            :s>=1?`<span class="circ-val" style="color:#ccc"></span>`
            :'');
        tbl+=`<td class="sc">${inner}</td>`;
      });

      tbl+=`<td class="nine-sep" style="padding:0;width:0;border-left:2px solid var(--gl)"></td>`;

      // Match game columns — use pre-computed running scores (keyed by PLAY ORDER index)
      activeGames.forEach((g,gi)=>{
        const cv = gameRunScores[gi][playIdx];
        let cellVal='', cellCls='ms blank';
        if(cv !== null){
          if(cv===0){cellVal='E';cellCls='ms even';}
          else if(cv>0){cellVal=`+${cv}`;cellCls='ms pos';}
          else{cellVal=String(cv);cellCls='ms neg';}
          // Mark 'P' on the play-order hole that triggers the next press
          const nextGame = activeGames[gi+1];
          if(nextGame && nextGame.startH === playIdx+1 && playIdx >= g.startH && playIdx <= g.endH){
            cellVal += ' P';
          }
        }
        tbl+=`<td class="${cellCls} nine-sep">${cellVal}</td>`;
      });
      tbl+='</tr>';

      // OUT summary row after the 9th hole played
      if(playIdx===8){
        tbl+=`<tr style="border-top:2px solid var(--gm);border-bottom:2px solid var(--gm)">
          <td class="row-lbl out">OUT</td><td class="tot out">${fPar}</td>`;
        allPi.forEach((pi,ii)=>tbl+=`<td class="tot out">${scored[ii]?gross[ii]:'—'}</td>`);
        tbl+=`<td class="nine-sep" style="padding:0;width:0;border-left:2px solid var(--gl)"></td>`;
        activeGames.forEach(()=>tbl+=`<td class="ms blank"></td>`);
        tbl+='</tr>';
      }
    }

    // ── IN row ──
    if(hasBack){
      tbl+=`<tr style="border-top:2px solid var(--gm)"><td class="row-lbl out">IN</td><td class="tot out">${bPar}</td>`;
      allPi.forEach((pi,ii)=>tbl+=`<td class="tot out">${bScored[ii]?bGross[ii]:'—'}</td>`);
      tbl+=`<td class="nine-sep" style="padding:0;width:0;border-left:2px solid var(--gl)"></td>`;
      activeGames.forEach(()=>tbl+=`<td class="ms blank"></td>`);
      tbl+='</tr>';

      // ── TOT row ──
      tbl+=`<tr style="border-top:2px solid #546e7a"><td class="row-lbl out" style="font-weight:800">TOT</td><td class="tot" style="font-weight:800">${fPar+bPar}</td>`;
      allPi.forEach((pi,ii)=>{
        const tot=(scored[ii]?gross[ii]:0)+(bScored[ii]?bGross[ii]:0);
        tbl+=`<td class="tot" style="font-weight:800">${(scored[ii]||bScored[ii])?tot:'—'}</td>`;
      });
      tbl+=`<td class="nine-sep" style="padding:0;width:0;border-left:2px solid var(--gl)"></td>`;
      activeGames.forEach(()=>tbl+=`<td class="ms blank"></td>`);
      tbl+='</tr>';
    }

    // NET row removed

    // ── TOTAL row ──
    const intlActive = (G.internationals||{})[m.matchId];
    // Always compute the 17-hole International preview (if H17 is complete and not tied),
    // so the "🌍 Press" marker can be shown even before The International is activated.
    const intl17 = computeInternational(m);
    // Only actually BUCKET games (remove from normal settlement) once International is active.
    const bucketed = intlActive && intl17 ? intl17.bucketedLabels : new Set();
    // Preview-only set, used purely for the marker when not yet active.
    const previewBucketed = intl17 ? intl17.bucketedLabels : new Set();

    // Per-game totals — bucketed games show as part of the large press, not their own amount
    let grandTotalA=0;
    const gameTotals=activeGames.map(g=>{
      let resAmt=0;
      if(g.isFrontPress){
        // leg9 and leg18 each count only if NOT bucketed into the International pot
        const pay9bucketed  = bucketed.has(g.label+'#leg9');
        const pay18bucketed = bucketed.has(g.label+'#leg18');
        const pay9  = (!pay9bucketed  && g.leg9.settled)  ? (g.leg9.score>0?(m.bet||2):g.leg9.score<0?-(m.bet||2):0) : 0;
        const pay18 = (!pay18bucketed && g.leg18.settled) ? (g.leg18.score>0?(m.bet||2):g.leg18.score<0?-(m.bet||2):0) : 0;
        resAmt = pay9 + pay18;
      } else if(bucketed.has(g.label)){
        resAmt = 0; // value moved into the large press column
      } else {
        if(g.winner==='A') resAmt=g.value;
        else if(g.winner==='B') resAmt=-g.value;
      }
      grandTotalA+=resAmt;
      return resAmt;
    });
    const colSpan=allPi.length+3;

    // Add the International (double-or-nothing): bank + hole-18 outcome.
    let pressNoteA = null; // net amount to side A from the International
    if(intlActive && intl17){
      const netA = intlNetToA(m, intl17);
      grandTotalA += netA;
      pressNoteA = netA;
    }

    let gtWinner, gtAmtDisplay, gtCls;
    if(intlActive && intl17 && pressNoteA===null){
      // International active but H18 not yet scored — show pending state
      gtCls='zero'; gtWinner=null; gtAmtDisplay='🌍 Pending H18';
    } else {
      gtCls=grandTotalA>0?'pos':grandTotalA<0?'neg':'zero';
      gtWinner=grandTotalA>0?m.labelA:grandTotalA<0?m.labelB:null;
      gtAmtDisplay=grandTotalA===0?'$0':'$'+Math.abs(grandTotalA);
    }

    tbl+=`<tr style="border-top:3px solid var(--gold)">
      <td class="gtl" colspan="${colSpan}" style="font-size:11px;font-weight:800">
        ${gtWinner?gtWinner+' '+((m.type==='2v2-combined')?'win':'wins'):'All Square'}
        <span style="color:var(--gold);margin-left:8px;font-size:13px">${gtAmtDisplay}</span>
      </td>`;

    gameTotals.forEach((amt,gi)=>{
      const g = activeGames[gi];
      const key = g.isFrontPress ? g.label+'#leg18' : g.label;
      const isBucketed = bucketed.has(key);       // International ACTIVE and this game is in the press
      const isPreview  = previewBucketed.has(key); // press-eligible, shown as a hint even if not active
      let cls, disp, marker='';
      if(isBucketed){
        cls='zero';
        disp='🌍 Press';
      } else {
        cls=amt>0?'pos':amt<0?'neg':'zero';
        disp=amt===0?'—':(amt>0?'+$':'-$')+Math.abs(amt);
        if(isPreview && !intlActive){
          marker=`<div style="font-size:9px;color:var(--gold);font-weight:800;line-height:1">🌍 I</div>`;
        }
      }
      tbl+=`<td class="gtv ${cls} nine-sep">${disp}${marker}</td>`;
    });
    if(activeGames.length===0) tbl+=`<td class="gtv nine-sep">—</td>`;
    tbl+='</tr></tbody></table>';
    return tbl;
  }

  const tl=is2v2?'High-Low Nassau':'1v1 Nassau';
  const cardId='card-'+Math.random().toString(36).slice(2,8);
  return `<div class="msc-card" id="${cardId}">
    <div class="msc-card-hdr">
      <div>
        <div class="msc-card-title">${m.labelA} vs ${m.labelB}</div>
        <div class="msc-card-sub">${tl} · $${m.bet} Nassau · ${roundDateStr()}</div>
      </div>
      <button class="export-btn" onclick="exportCard('${cardId}','${(m.labelA+' vs '+m.labelB).replace(/'/g,'')}')" ontouchstart="">
        📸 Export
      </button>
    </div>
    <div class="msc-wrap">${buildCard()}</div>
    ${buildInternationalPanel(m)}
  </div>`;
}

// Renders the "The International" button / status panel for a match
function buildInternationalPanel(m){
  if(!INTERNATIONAL_ENABLED) return '';
  const intl = computeInternational(m);
  const active = (G.internationals||{})[m.matchId];

  // In saved/exported (read-only) views, never show the pre-call OFFER or the scenario
  // projection table — those are only useful live while the trailers are deciding. A called
  // International still shows its final settled result below.
  if(_renderReadOnly && !active) return '';

  // Once the round is complete there is nothing left to call, so the offer panel and its
  // scenario table disappear. (A called International still shows its final settled result.)
  if(!active && isRoundComplete()) return '';

  if(!active){
    // H17 not complete yet — nothing to show
    for(let h=0; h<=16; h++){ if(holeResult(m,h)===null) return ''; }

    if(!intl){
      // H17 complete but the match is perfectly tied overall — no losing team to offer it to
      return `<div class="intl-panel"><div class="intl-txt" style="opacity:.7">Match is tied through 17 — no International available.</div></div>`;
    }
    if(intl.largePress<=0){
      // H17 complete, one side is down money, but nothing is out-of-band to bundle yet
      const callerLbl0 = intl.internationaleeSide==='A' ? m.labelA : m.labelB;
      return `<div class="intl-panel"><div class="intl-txt" style="opacity:.7">${callerLbl0} ${(m.type==='2v2-combined')?'are':'is'} down after 17, but every game is still close — nothing to press yet.</div></div>`;
    }
    // Show the offer — available to the losing team after H17, with full payout scenarios.
    const callerLbl = intl.internationaleeSide==='A' ? m.labelA : m.labelB;
    const pot = intl.largePress;
    const is2v2 = (m.type==='2v2-combined');

    // Simulate each possible hole-18 result and read the resulting match total to Side A.
    // We temporarily write synthetic gross scores on hole 18, flag the International active,
    // run computeMoney(), then restore everything. This guarantees the shown figures match
    // exactly what the app will pay (protected games + International, per the leader rule).
    const h18idx = actualHoleIdx(17);
    const saved = G.scores.map(r=>r[h18idx]);
    const savedFlag = G.internationals[m.matchId];
    const par18 = G.par[h18idx];

    // Per-player strokes received on hole 18 (so we can target NET results precisely).
    const mph = matchPlayHdcps([...m.sideA, ...m.sideB]);
    const allIdx = [...m.sideA, ...m.sideB];
    const strokeOn18 = {};
    allIdx.forEach((pi,k)=>{ strokeOn18[pi] = matchStrokes(mph[k])[h18idx]; });

    // Set hole-18 gross so each player's NET equals (par18 + netOffset). gross = net + strokes.
    function setH18Net(aOffsets, bOffsets){
      m.sideA.forEach((pi,k)=>{ G.scores[pi][h18idx] = par18 + aOffsets[k] + strokeOn18[pi]; });
      m.sideB.forEach((pi,k)=>{ G.scores[pi][h18idx] = par18 + bOffsets[k] + strokeOn18[pi]; });
    }
    // Per-matchup total to Side A for the CURRENT hole-18 scores — mirrors the final-result
    // banner exactly (this matchup's protected games + the Big I swing). We must NOT use
    // computeMoney()[player], because that sums the player's winnings across EVERY game in
    // the round (other matchups they're in), which over-counts this single matchup.
    function totalToA(){
      const intlNow = computeInternational(m);   // recompute with the synthetic hole 18 in place
      const bucketedNow = intlNow ? intlNow.bucketedLabels : new Set();
      let tA = 0;
      computeMatchGames(m).forEach(g=>{
        if(g.isFrontPress){
          const pay9  = (!bucketedNow.has(g.label+'#leg9')  && g.leg9.settled  && g.leg9.score!==0)  ? (g.leg9.score>0?base_(m):-base_(m)) : 0;
          const pay18 = (!bucketedNow.has(g.label+'#leg18') && g.leg18.settled && g.leg18.score!==0) ? (g.leg18.score>0?base_(m):-base_(m)) : 0;
          tA += pay9 + pay18;
        } else if(bucketedNow.has(g.label)){
          // value moved into the pot
        } else if(g.settled && g.winner!=='tie'){
          tA += g.winner==='A' ? g.value : -g.value;
        }
      });
      if(intlNow) tA += intlNetToA(m, intlNow);
      return tA;
    }

    // Per-matchup total to Side A with NO International — every game (and press leg) settles
    // normally on the synthetic hole-18 scores. Lets the trailers see what they'd get if they
    // DON'T call it, side by side with the International outcome.
    function totalToA_noIntl(){
      let tA = 0;
      computeMatchGames(m).forEach(g=>{
        if(g.isFrontPress){
          const pay9  = (g.leg9.settled  && g.leg9.score!==0)  ? (g.leg9.score>0?base_(m):-base_(m)) : 0;
          const pay18 = (g.leg18.settled && g.leg18.score!==0) ? (g.leg18.score>0?base_(m):-base_(m)) : 0;
          tA += pay9 + pay18;
        } else if(g.settled && g.winner!=='tie'){
          tA += g.winner==='A' ? g.value : -g.value;
        }
      });
      return tA;
    }

    // Net offsets per player (0 = net par, +3 = three over net). Big gaps keep win/loss unambiguous;
    // ties are exact because we work in NET terms. Each scenario captures BOTH outcomes:
    // [label, withInternational, withoutInternational].
    const scen=[];
    function pushScen(label, a, b){ setH18Net(a,b); scen.push([label, totalToA(), totalToA_noIntl()]); }
    if(is2v2){
      pushScen(`${m.labelA} take both points (+2)`, [0,0],[3,3]);
      pushScen(`${m.labelA} take one point (+1)`,   [0,3],[3,3]);   // A low wins, high tied
      pushScen(`Hole 18 halved`,                    [0,3],[0,3]);   // both balls tied
      pushScen(`${m.labelB} take one point (\u22121)`, [3,3],[0,3]); // B low wins, high tied
      pushScen(`${m.labelB} take both points (\u22122)`, [3,3],[0,0]);
    } else {
      pushScen(`${m.labelA} wins hole 18`, [0],[2]);
      pushScen(`Hole 18 halved`,          [0],[0]);
      pushScen(`${m.labelB} wins hole 18`, [2],[0]);
    }

    // Restore original hole-18 scores and flag
    G.scores.forEach((r,pi)=>{ r[h18idx]=saved[pi]; });
    if(savedFlag===undefined) delete G.internationals[m.matchId]; else G.internationals[m.matchId]=savedFlag;

    // Compact cell: signed dollar amount from the CALLER's (trailers') perspective.
    // +green = trailers gain, -red = trailers pay, $0 = wash. No names (the row says who).
    const callerIsA = (intl.internationaleeSide==='A');
    function cell(v){
      const toCaller = callerIsA ? v : -v;   // v is signed to side A
      if(toCaller===0) return `<span class="idraw">$0</span>`;
      const cls = toCaller>0 ? 'iwin' : 'ilose';
      const txt = (toCaller>0?'+$':'\u2212$') + Math.abs(toCaller);
      return `<span class="${cls}">${txt}</span>`;
    }

    const rowsHtml = scen.map(s=>{
      const [label, called, notCalled] = s;
      // Highlight when calling it is strictly better for the caller than not calling.
      const callerCalled    = callerIsA ? called    : -called;
      const callerNotCalled = callerIsA ? notCalled : -notCalled;
      const better = callerCalled > callerNotCalled ? ' class="icalled-better"' : '';
      return `<tr${better}><td>${label}</td><td>${cell(notCalled)}</td><td>${cell(called)}</td></tr>`;
    }).join('');

    const scenHtml = `<table class="intl-table">
      <thead><tr><th>Hole 18 result</th><th>Not<br>called</th><th>Called<br>🌍</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <div style="font-size:11px;color:#7a6a4a;margin-top:5px;line-height:1.4">Amounts shown for <b>${callerLbl}</b> (+ = they win, \u2212 = they pay). Green rows = calling it beats not calling for them.</div>`;

    return `<div class="intl-panel">
      <div class="intl-offer">
        <div class="intl-txt">The amount eligible for <b>The International</b> is <b>$${pot}</b>. Those games are marked with the 🌍 globe above — the remaining games play out normally.<br><br>
          <b>${callerLbl}</b> ${(m.type==='2v2-combined')?'are':'is'} down money after 17 and may call it. Here is how the match settles for each hole-18 result:</div>
        ${scenHtml}
        <button class="intl-btn" onclick="activateInternational('${m.matchId}')">🌍 Call The International</button>
      </div>
    </div>`;
  }

  // Active — show status / result
  if(!intl){
    return `<div class="intl-panel"><div class="intl-txt">The International is active for this match.</div></div>`;
  }
  const inteeLabel = intl.internationaleeSide==='A' ? m.labelA : m.labelB;
  const intlerLabel = intl.internationaleeSide==='A' ? m.labelB : m.labelA;
  const h18 = holeResult(m, 17);
  const leaderLabel = intl.leaderSign>0 ? m.labelA : intl.leaderSign<0 ? m.labelB : null;
  const otherLabel  = intl.leaderSign>0 ? m.labelB : m.labelA;
  const pot = intl.largePress;

  if(h18===null){
    // The Big I called, hole 18 not yet scored.
    return `<div class="intl-panel intl-active">
      <div class="intl-txt" style="text-align:center;font-size:16px;font-weight:800">🌍 International has been Called!</div>
      <button class="intl-undo" onclick="deactivateInternational('${m.matchId}')">Undo</button>
    </div>`;
  }

  // H18 settled — overall total for this match = normal (non-bucketed) settlement + swing
  const bucketed = intl.bucketedLabels;
  let totalA = 0;
  computeMatchGames(m).forEach(g=>{
    if(g.isFrontPress){
      const pay9  = (!bucketed.has(g.label+'#leg9')  && g.leg9.settled  && g.leg9.score!==0)  ? (g.leg9.score>0?(m.bet||2):-(m.bet||2)) : 0;
      const pay18 = (!bucketed.has(g.label+'#leg18') && g.leg18.settled && g.leg18.score!==0) ? (g.leg18.score>0?(m.bet||2):-(m.bet||2)) : 0;
      totalA += pay9 + pay18;
    } else if(bucketed.has(g.label)){
      // value moved into the large press / bank
    } else if(g.settled && g.winner!=='tie'){
      totalA += g.winner==='A' ? g.value : -g.value;
    }
  });
  totalA += intlNetToA(m, intl);

  const overallWinner = totalA>0?m.labelA:totalA<0?m.labelB:null;
  const overallAmt = Math.abs(totalA);
  // "wins" for a single player (1v1), "win" for a pair (2v2)
  const winVerb = (m.type==='2v2-combined') ? 'win' : 'wins';
  const resultLine = overallWinner
    ? `🌍 <b>The International Final</b> — ${overallWinner} ${winVerb} <span style="font-size:16px">$${overallAmt}</span>`
    : `🌍 <b>The International Final</b> — All square ($0)`;

  return `<div class="intl-panel intl-active">
    <div class="intl-txt" style="text-align:center">${resultLine}</div>
  </div>`;
}

function activateInternational(matchId){
  if(!G.internationals) G.internationals = {};
  G.internationals[matchId] = true;
  saveG();
  renderBets();
  updateInternationalBadge();
}
function deactivateInternational(matchId){
  if(!G.internationals) G.internationals = {};
  delete G.internationals[matchId];
  saveG();
  renderBets();
  updateInternationalBadge();
}

// Shows a 🌍 badge on the bottom-nav Nassau icon if The International has been
// called (activated) for any match in the current round.
function updateInternationalBadge(){
  const badge=document.getElementById('intlBadge');
  if(!badge) return;
  const anyActive = G.internationals && Object.keys(G.internationals).length>0;
  badge.style.display = anyActive ? 'flex' : 'none';
}

function renderBets(){
  const money=computeMoney();
  let html='<div style="padding:12px 16px;padding-bottom:170px">';

  // Save Round button — shown once all 18 holes are scored and not yet saved
  if(isRoundComplete() && !isCurrentRoundSaved()){
    html += `<button class="save-round-btn" onclick="manualSaveRound()">💾 Save Round</button>`;
  } else if(isCurrentRoundSaved()){
    html += `<div class="save-round-done">✓ Round saved to History</div>`;
  }

  const matchups=buildMatchups();
  if(!matchups.length){
    html+=`<div style="text-align:center;color:rgba(255,255,255,.5);padding:40px 0">No Nassau games configured</div>`;
  } else {
    matchups.forEach((m,mi)=>{ html+=renderOneMatchCard(m, mi); });
  }

  html+='<div style="text-align:center;padding:14px 0 8px;color:rgba(255,255,255,.35);font-size:10px">Nassau Golf · Derrick GWC · v16.2</div></div>';
  document.getElementById('betsBody').innerHTML=html;
}

/* ═══════════════════════════════════════════════
   TOTALS SCREEN
═══════════════════════════════════════════════ */
// Returns markup wrapping a gross score per its relation to par:
//   eagle or better -> double circle, birdie -> single circle, par -> plain,
//   bogey -> single square, double or worse -> double square
function scoreMark(g, par){
  const toPar=g-par;
  if(toPar<=-2) return `<span class="mark-val mark-circ2">${g}</span>`;
  if(toPar===-1) return `<span class="mark-val mark-circ1">${g}</span>`;
  if(toPar===1) return `<span class="mark-val mark-sq1">${g}</span>`;
  if(toPar>=2) return `<span class="mark-val mark-sq2">${g}</span>`;
  return `${g}`;
}

/* ═══════════════════════════════════════════════
   DERRICK-STYLE MASTER SCORECARD
   Full course card with all players' gross scores,
   handicap-stroke holes circled, net totals.
═══════════════════════════════════════════════ */
function renderMasterScorecard(){
  const Y = DERRICK_YARDS;
  // Each player's full-handicap stroke map (rounded index)
  const strokeMaps = G.players.map(p => matchStrokes(Math.round(p.idx)));

  let html = `<div id="masterCard" style="background:#fff;border-radius:12px;overflow:hidden;margin-top:10px">`;
  html += `<div style="background:var(--gd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
    <div><div style="font-size:15px;font-weight:700;color:var(--gold);font-family:Georgia,serif">Derrick GWC · Master Scorecard</div>
    <div style="font-size:11px;color:var(--gl)">${roundDateStr()}${G.startHole>1?(' · Shotgun: Hole '+G.startHole):''}</div></div>
    <button class="export-btn" onclick="exportEl('masterCard','Derrick-Master-Scorecard')" ontouchstart="">📸</button>
  </div>`;

  html += `<div class="dck-wrap"><table class="dck"><thead><tr>
    <th class="d-hdr d-holehdr"><img src="${DERRICK_LOGO}" alt="Derrick" class="d-holelogo"><div class="d-holetxt">HOLE</div></th>
    <th class="d-deckhdr d-deck1 d-vert">DECK 1</th>
    <th class="d-deckhdr d-deck2 d-vert">DECK 2</th>
    <th class="d-deckhdr d-deck3 d-vert">DECK 3</th>
    <th class="d-deckhdr d-deck4 d-vert">DECK 4</th>
    <th class="d-hdr d-vert">M HCP</th>
    <th class="d-hdr">PAR</th>`;
  G.players.forEach(p=>{
    html += `<th class="d-hdr d-vert">${p.name.trim()} <span class="d-sub2">${p.idx.toFixed(1)}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  function holeRow(playIdx){
    const h = actualHoleIdx(playIdx);
    let r = `<tr>
      <td class="d-hole">${h+1}</td>
      <td class="d-deck1">${Y.d1[h]}</td>
      <td class="d-deck2">${Y.d2[h]}</td>
      <td class="d-deck3">${Y.d3[h]}</td>
      <td class="d-deck4">${Y.d4[h]}</td>
      <td class="d-hcp">${G.si[h]}</td>
      <td class="d-par">${G.par[h]}</td>`;
    G.players.forEach((p,pi)=>{
      const g=G.scores[pi][h];
      const stk=strokeMaps[pi][h];
      let inner;
      if(g===null){
        inner = stk===2 ? '<span class="circle-empty2">·</span>'
              : stk===1 ? '<span class="circle-empty1">·</span>'
              : '·';
      } else {
        inner = stk===2 ? `<span class="circle2">${g}</span>`
              : stk===1 ? `<span class="circle1">${g}</span>`
              : `${g}`;
      }
      r += `<td class="d-score">${inner}</td>`;
    });
    return r+'</tr>';
  }

  // Front 9
  for(let i=0;i<9;i++) html+=holeRow(i);
  // OUT
  html += subRow('OUT', 0, 9, strokeMaps);
  // Back 9
  for(let i=9;i<18;i++) html+=holeRow(i);
  // IN
  html += subRow('IN', 9, 18, strokeMaps);
  // TOT
  html += totRow(strokeMaps);
  // NET
  html += netRow();
  // Money summary rows (once round complete) — skipped entirely in scorecard-only rounds
  if(isRoundComplete() && !G.scorecardOnly){
    const nassau = computeMoney();
    const hasSix = G.sixPointGames && G.sixPointGames.length;
    const six = hasSix ? computeSixPointMoney() : null;
    const total = G.players.map((_,pi)=>nassau[pi] + (six?six[pi]:0));
    html += moneyRow('Nassau $', nassau, '#1f5135');
    if(hasSix) html += moneyRow('6-Point $', six, '#1f5135');
    html += moneyRow('Total $ Today', total, 'var(--gd)', true);
  }

  html += `</tbody></table></div>`;
  html += `<div style="padding:6px 14px;font-size:10px;color:var(--inkl)">🔴 thin circle = 1 shot · double = 2 shots (full handicap) · NET = gross total − full handicap index.</div>`;
  html += `<div style="padding:0 14px 8px;font-size:10px;color:var(--inkl);font-weight:600">⏱️ ${paceOfPlayStr()}</div>`;
  html += `</div>`;
  return html;

  function subRow(label, start, end, sm){
    const yTot = k => { let s=0; for(let i=start;i<end;i++) s+=Y[k][actualHoleIdx(i)]; return s; };
    let parTot=0; for(let i=start;i<end;i++) parTot+=G.par[actualHoleIdx(i)];
    let r = `<tr><td class="d-sub">${label}</td>
      <td class="d-sub d-decknum">${yTot('d1')}</td><td class="d-sub d-decknum">${yTot('d2')}</td>
      <td class="d-sub d-decknum">${yTot('d3')}</td><td class="d-sub d-decknum">${yTot('d4')}</td>
      <td class="d-sub"></td><td class="d-subpar">${parTot}</td>`;
    G.players.forEach((p,pi)=>{
      let sum=0, any=false, all=true;
      for(let i=start;i<end;i++){ const g=G.scores[pi][actualHoleIdx(i)]; if(g!==null){sum+=g;any=true;} else all=false; }
      r += `<td class="d-sub" style="background:#5a5a5a">${all?sum:'·'}</td>`;
    });
    return r+'</tr>';
  }
  function totRow(sm){
    const yT = k => Y[k].reduce((a,b)=>a+b,0);
    let r=`<tr><td class="d-subpar">TOT</td>
      <td class="d-subpar d-decknum">${yT('d1')}</td><td class="d-subpar d-decknum">${yT('d2')}</td>
      <td class="d-subpar d-decknum">${yT('d3')}</td><td class="d-subpar d-decknum">${yT('d4')}</td>
      <td class="d-subpar"></td><td class="d-subpar">${G.par.reduce((a,b)=>a+b,0)}</td>`;
    G.players.forEach((p,pi)=>{
      const all=G.scores[pi].every(s=>s!==null);
      const tot=G.scores[pi].reduce((a,b)=>a+(b||0),0);
      r+=`<td class="d-subpar">${all?tot:'·'}</td>`;
    });
    return r+'</tr>';
  }
  function netRow(){
    let r=`<tr><td class="d-sub" style="background:var(--gm)">NET</td>
      <td class="d-sub" style="background:var(--gm)" colspan="6"></td>`;
    G.players.forEach((p,pi)=>{
      const all=G.scores[pi].every(s=>s!==null);
      const tot=G.scores[pi].reduce((a,b)=>a+(b||0),0);
      const net=all?tot-Math.round(p.idx):null;
      r+=`<td class="d-sub" style="background:var(--gm)">${net!==null?net:'·'}</td>`;
    });
    return r+'</tr>';
  }
  function moneyRow(label, money, bg, bold){
    const fw = bold ? 800 : 700;
    let r=`<tr><td class="d-sub" style="background:${bg};font-weight:${fw};font-size:9px">${label}</td>
      <td class="d-sub" style="background:${bg}" colspan="6"></td>`;
    G.players.forEach((p,pi)=>{
      const v=money[pi];
      const disp = v>0?'+$'+v : v<0?'-$'+Math.abs(v) : '$0';
      const col = v>0?'#7CFC9E' : v<0?'#ff9b9b' : '#fff';
      r+=`<td class="d-sub" style="background:${bg};color:${col};font-weight:${fw}">${disp}</td>`;
    });
    return r+'</tr>';
  }
}

/* ═══════════════════════════════════════════════
   DERRICK-STYLE PER-MATCH CARDS
   One card per match showing adjusted match handicaps,
   gross scores, and running F9/B9/18/press columns.
═══════════════════════════════════════════════ */
function renderMatchCards(){
  let html='';
  const matchups = buildMatchups();
  matchups.forEach((m,mi)=>{
    html += renderOneMatchCard(m, mi);
  });
  // 6-point games
  if(G.sixPointGames && G.sixPointGames.length){
    G.sixPointGames.forEach((game,gi)=>{ html += renderSixPointCard(game, gi); });
  }
  return html;
}

function renderOneMatchCard(m, mi){
  const Y=DERRICK_YARDS;
  const allIdxs=[...m.sideA,...m.sideB];
  const playHdcps=matchPlayHdcps(allIdxs); // adjusted: low player → 0
  const strokeMaps=playHdcps.map(ph=>matchStrokes(ph));
  const games=computeMatchGames(m);

  // International eligibility (same logic as the original scorecard):
  // intl17.bucketedLabels = games eligible to fold into the Large Press after H17.
  const intlActive = (G.internationals||{})[m.matchId];
  const intl17 = computeInternational(m);
  const bucketed        = (intlActive && intl17) ? intl17.bucketedLabels : new Set();
  const previewBucketed = intl17 ? intl17.bucketedLabels : new Set();
  function intlKey(g){ return g.isFrontPress ? g.label+'#leg18' : g.label; }
  function intlMarker(g){
    // Header globe: show if ANY part of this game is in the pot.
    if(g.isFrontPress){
      if(bucketed.has(g.label+'#leg9') || bucketed.has(g.label+'#leg18') ||
         previewBucketed.has(g.label+'#leg9') || previewBucketed.has(g.label+'#leg18')) return '🌍';
      return '';
    }
    const key=g.label;
    if(bucketed.has(key) || previewBucketed.has(key)) return '🌍';
    return '';
  }
  // Per-cell globe: marks the exact hole where a bucketed game/leg "lands":
  //   front-nine pieces (Front 9, a press's front leg) settle at hole 9 (playIdx 8);
  //   everything else (Back 9, Total 18, back-nine presses, a press's back leg) at hole 17 (playIdx 16).
  function cellGlobe(g, playIdx){
    const inPot = (lbl)=> bucketed.has(lbl) || previewBucketed.has(lbl);
    if(g.isFrontPress){
      if(playIdx===8  && inPot(g.label+'#leg9'))  return true;  // front leg lands at hole 9
      if(playIdx===16 && inPot(g.label+'#leg18')) return true;  // back leg lands at hole 17
      return false;
    }
    const landing = (g.label==='Front 9') ? 8 : 16;             // F9 at 9; B9 / Full 18 / back presses at 17
    return playIdx===landing && inPot(g.label);
  }

  // Build per-hole running state for each game column
  const cols = games.map(g=>{
    const cells=Array(18).fill('');
    let running=0, counting=false;
    for(let playIdx=0; playIdx<18; playIdx++){
      if(playIdx < g.startH || playIdx > g.endH){ continue; }
      const r=holeResult(m, playIdx);
      if(r===null){ continue; }
      if(g.isPress && playIdx===g.startH){
        // The press is declared on its start hole — shown as 'P', not yet counting.
        cells[playIdx]='P';
        counting=true;
        continue;
      }
      if(g.isPress && !counting){ continue; }
      running+=r;
      cells[playIdx] = running>0?`+${running}`:running<0?`${running}`:'E';
    }
    return {label:g.label, cells, game:g};
  });

  const cardId=`matchCard${mi}`;
  let html=`<div id="${cardId}" style="background:#fff;border-radius:12px;overflow:hidden;margin-top:10px">`;
  html+=`<div style="background:var(--gd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
    <div><div style="font-size:14px;font-weight:700;color:var(--gold)">${m.labelA} vs ${m.labelB}</div>
    <div style="font-size:11px;color:var(--gl)">${m.type==='2v2-combined'?'2v2 High-Low':'1v1'} · $${m.bet}/side</div></div>
    <button class="export-btn" onclick="exportEl('${cardId}','Match-${mi+1}')" ontouchstart="">📸</button>
  </div>`;

  // Adjusted handicap note
  const hcpNote = allIdxs.map((pi,ii)=>`${G.players[pi].name.split(/\s+/)[0]} ${playHdcps[ii]>0?'+'+playHdcps[ii]:'scratch'}`).join(' · ');
  html+=`<div style="padding:6px 14px;font-size:10px;color:var(--inkl);background:#f9f7f3">Adjusted match handicaps: ${hcpNote}</div>`;

  html+=`<div class="dck-wrap"><table class="dck"><thead><tr>
    <th class="d-hdr">H</th><th class="d-hdr">HCP</th><th class="d-hdr">PAR</th>`;
  allIdxs.forEach((pi,ii)=>{
    html+=`<th class="d-hdr d-vert">${G.players[pi].name.trim()} <span class="d-sub2">${playHdcps[ii]>0?'+'+playHdcps[ii]:'0'}</span></th>`;
  });
  cols.forEach(c=>{
    const isNassau = !c.game.isPress; // F9, B9, 18 are the three base Nassau bets
    const globe=intlMarker(c.game);
    if(isNassau){
      const lbl = c.label.replace('Front 9','Nassau F9').replace('Back 9','Nassau B9').replace('Full 18','Nassau 18');
      html+=`<th class="d-matchhdr d-vert">${lbl}${globe?'<br>'+globe:''}</th>`;
    } else {
      const lbl=c.label.replace(/Press (\d+).*/,'P$1');
      html+=`<th class="d-matchhdr">${lbl}${globe?'<br>'+globe:''}</th>`;
    }
  });
  html+=`</tr></thead><tbody>`;

  function row(playIdx){
    const h=actualHoleIdx(playIdx);
    let r=`<tr><td class="d-hole">${h+1}</td><td class="d-hcp">${G.si[h]}</td><td class="d-par">${G.par[h]}</td>`;
    allIdxs.forEach((pi,ii)=>{
      const g=G.scores[pi][h];
      const stk=strokeMaps[ii][h];
      let cell;
      if(g===null){
        cell = stk===2 ? '<span class="circle-empty2">·</span>'
             : stk===1 ? '<span class="circle-empty1">·</span>'
             : '·';
      } else {
        cell = stk===2 ? `<span class="circle2">${g}</span>`
             : stk===1 ? `<span class="circle1">${g}</span>`
             : `${g}`;
      }
      r+=`<td class="d-score">${cell}</td>`;
    });
    cols.forEach(c=>{
      const v=c.cells[playIdx];
      const isNassau = !c.game.isPress;
      const cls = v==='P'?'d-press':(isNassau?'d-match d-nassaucell':'d-match');
      const globe = cellGlobe(c.game, playIdx) ? '<span class="cell-globe">🌍</span>' : '';
      r+=`<td class="${cls}">${globe}${v}</td>`;
    });
    return r+'</tr>';
  }

  for(let i=0;i<9;i++) html+=row(i);
  html+=matchSubRow('OUT',0,9,allIdxs,cols);
  for(let i=9;i<18;i++) html+=row(i);
  html+=matchSubRow('IN',9,18,allIdxs,cols);

  // ── Overall match result (includes International Large Press if active) ──
  let grandTotalA=0;
  games.forEach(g=>{
    const key = g.isFrontPress ? g.label+'#leg18' : g.label;
    if(g.isFrontPress){
      const pay9bucketed  = bucketed.has(g.label+'#leg9');
      const pay18bucketed = bucketed.has(g.label+'#leg18');
      const pay9  = (!pay9bucketed  && g.leg9.settled)  ? (g.leg9.score>0?(m.bet||2):g.leg9.score<0?-(m.bet||2):0) : 0;
      const pay18 = (!pay18bucketed && g.leg18.settled) ? (g.leg18.score>0?(m.bet||2):g.leg18.score<0?-(m.bet||2):0) : 0;
      grandTotalA += pay9 + pay18;
    } else if(bucketed.has(key)){
      // value folded into the large press
    } else if(g.settled && g.winner!=='tie'){
      grandTotalA += g.winner==='A' ? g.value : -g.value;
    }
  });
  let pressNoteA=null;
  if(intlActive && intl17){
    pressNoteA = intlNetToA(m, intl17);
    grandTotalA += pressNoteA;
  }
  const totalCols = 3 + allIdxs.length + cols.length;
  const done = isRoundComplete();
  const winVerb = (m.type==='2v2-combined') ? 'win' : 'wins';
  // The result banner only appears once the round is complete (the final, accurate total).
  // Mid-round we don't show a "currently ahead" figure — per-game standings are in the WINS row.
  let resultLine = null;
  if(intlActive && intl17 && holeResult(m,17)===null){
    resultLine = `🌍 International ON — $${intl17.largePress} pot, double-or-nothing on hole 18`;
  } else if(done){
    if(grandTotalA>0)      resultLine = `${m.labelA} ${winVerb} $${Math.abs(grandTotalA)}`;
    else if(grandTotalA<0) resultLine = `${m.labelB} ${winVerb} $${Math.abs(grandTotalA)}`;
    else                   resultLine = 'All square — $0';
  }
  if(resultLine!==null){
    html+=`<tr><td colspan="${totalCols}" style="background:var(--gd);color:var(--gold);font-weight:800;font-size:12px;text-align:center;padding:7px 4px">${resultLine}</td></tr>`;
  }

  // WINS row — settlement per game column, signed from the first side's (Player 1 / Side A) perspective.
  // A loss for Side A shows as a red -$ amount.
  html+=`<tr><td class="d-wins" colspan="3">WINS</td>`;
  allIdxs.forEach(()=>html+=`<td class="d-wins"></td>`);
  cols.forEach(c=>{
    const g=c.game;
    const key=intlKey(g);
    let amt='', neg=false;
    if(bucketed.has(key)){
      amt='🌍';  // value folded into the Large Press
    } else if(g.settled && g.winner!=='tie'){
      // Signed amount: positive = Side A wins, negative = Side A loses
      let signed;
      if(g.isFrontPress){ signed = g.combinedPay||0; }
      else { signed = g.winner==='A' ? g.value : -g.value; }
      neg = signed < 0;
      amt = neg ? '-$'+Math.abs(signed) : '$'+Math.abs(signed);
    } else if(g.settled && g.winner==='tie'){ amt='$0'; }
    const col = neg ? 'color:var(--red)' : '';
    html+=`<td class="d-wins" style="${col}">${amt}</td>`;
  });
  html+='</tr>';

  html+=`</tbody></table></div>`;
  html+=`<div style="padding:6px 14px;font-size:10px;color:var(--inkl)">🔴 thin circle = 1 shot · double = 2 shots (off low player) · E = even · P = press${INTERNATIONAL_ENABLED?' · 🌍 = International-eligible':''}</div>`;
  html+=`<div style="padding:0 14px 8px;font-size:10px;color:var(--inkl);font-weight:600">⏱️ ${paceOfPlayStr()}</div>`;
  html+=buildInternationalPanel(m);
  html+=`</div>`;
  return html;

  function matchSubRow(label,start,end,idxs,cols){
    let parTot=0; for(let i=start;i<end;i++) parTot+=G.par[actualHoleIdx(i)];
    let r=`<tr><td class="d-sub">${label}</td><td class="d-sub"></td><td class="d-subpar">${parTot}</td>`;
    idxs.forEach((pi)=>{
      let sum=0,all=true;
      for(let i=start;i<end;i++){const g=G.scores[pi][actualHoleIdx(i)];if(g!==null)sum+=g;else all=false;}
      r+=`<td class="d-sub" style="background:#5a5a5a">${all?sum:'·'}</td>`;
    });
    cols.forEach(()=>r+=`<td class="d-sub"></td>`);
    return r+'</tr>';
  }
}

function renderSixPointCard(game, gi){
  const r=computeSixPoint(game);
  const idxs=game.players;
  const cardId=`sixCard${gi}`;
  let html=`<div id="${cardId}" style="background:#fff;border-radius:12px;overflow:hidden;margin-top:10px">`;
  html+=`<div style="background:var(--gd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
    <div><div style="font-size:14px;font-weight:700;color:var(--gold)">6-Point · ${idxs.map(i=>G.players[i].name.split(/\s+/)[0]).join(', ')}</div>
    <div style="font-size:11px;color:var(--gl)">$${game.perPoint}/point</div></div>
    <button class="export-btn" onclick="exportEl('${cardId}','SixPoint-${gi+1}')" ontouchstart="">📸</button>
  </div>`;
  const playHdcps=matchPlayHdcps(idxs);
  html+=`<div class="dck-wrap"><table class="dck"><thead><tr>
    <th class="d-hdr">H</th><th class="d-hdr">HCP</th><th class="d-hdr">PAR</th>`;
  // Score columns — full player name + adjusted handicap
  idxs.forEach((pi,ii)=>html+=`<th class="d-hdr d-vert">${G.players[pi].name.trim()} <span class="d-sub2">${playHdcps[ii]>0?'+'+playHdcps[ii]:'0'}</span></th>`);
  // Spacer
  html+=`<th class="d-gap"></th>`;
  // Points columns — full player name + "pts"
  idxs.forEach((pi)=>html+=`<th class="d-hdr d-vert" style="background:#1B4332;color:var(--gold)">${G.players[pi].name.trim()} <span class="d-sub2">pts</span></th>`);
  html+=`</tr></thead><tbody>`;
  const strokeMaps=playHdcps.map(ph=>matchStrokes(ph));
  for(let playIdx=0;playIdx<18;playIdx++){
    const h=actualHoleIdx(playIdx);
    html+=`<tr><td class="d-hole">${h+1}</td><td class="d-hcp">${G.si[h]}</td><td class="d-par">${G.par[h]}</td>`;
    idxs.forEach((pi,ii)=>{
      const g=G.scores[pi][h];
      const stk=strokeMaps[ii][h];
      let cell;
      if(g===null){
        // No score yet — show empty stroke marker if this hole gives shots
        cell = stk===2 ? '<span class="circle-empty2">·</span>'
             : stk===1 ? '<span class="circle-empty1">·</span>'
             : '·';
      } else {
        cell = stk===2 ? `<span class="circle2">${g}</span>`
             : stk===1 ? `<span class="circle1">${g}</span>`
             : `${g}`;
      }
      html+=`<td class="d-score">${cell}</td>`;
    });
    html+=`<td class="d-gap"></td>`;
    const pts=r.pointsPerHole[h];
    idxs.forEach((pi,ii)=>html+=`<td class="d-match">${pts?pts[ii]:''}</td>`);
    html+='</tr>';
  }
  // Totals
  html+=`<tr><td class="d-wins" colspan="3">TOTAL PTS</td>`;
  idxs.forEach(()=>html+=`<td class="d-wins"></td>`);
  html+=`<td class="d-gap"></td>`;
  r.totals.forEach(t=>html+=`<td class="d-wins">${t}</td>`);
  html+='</tr>';
  // Money settlement row (only once all 18 holes scored)
  if(r.settlement){
    html+=`<tr><td class="d-sub" colspan="3" style="background:var(--gm)">$ WON/LOST</td>`;
    idxs.forEach(()=>html+=`<td class="d-sub" style="background:var(--gm)"></td>`);
    html+=`<td class="d-gap"></td>`;
    idxs.forEach((pi,ii)=>{
      const v=r.settlement.money[ii];
      const col = v>0?'#7CFC9E':v<0?'#ff9b9b':'#fff';
      html+=`<td class="d-sub" style="background:var(--gm);color:${col}">${v>0?'+$'+v:v<0?'-$'+Math.abs(v):'$0'}</td>`;
    });
    html+='</tr>';
  } else if(r.holesPlayed>0){
    // CURRENT winnings — pairwise settlement applied to the standing through the holes played so far.
    const proj = idxs.map(()=>0);
    for(let i=0;i<3;i++){
      for(let j=i+1;j<3;j++){
        const diff=(r.totals[i]-r.totals[j])*game.perPoint;
        proj[i]+=diff; proj[j]-=diff;
      }
    }
    html+=`<tr><td class="d-sub" colspan="3" style="background:var(--gm)">CURRENT $</td>`;
    idxs.forEach(()=>html+=`<td class="d-sub" style="background:var(--gm)"></td>`);
    html+=`<td class="d-gap"></td>`;
    idxs.forEach((pi,ii)=>{
      const v=proj[ii];
      const col = v>0?'#7CFC9E':v<0?'#ff9b9b':'#fff';
      html+=`<td class="d-sub" style="background:var(--gm);color:${col}">${v>0?'+$'+v:v<0?'-$'+Math.abs(v):'$0'}</td>`;
    });
    html+='</tr>';
  }
  html+=`</tbody></table></div>`;
  html+=`<div style="padding:6px 14px;font-size:10px;color:var(--inkl)">🔴 thin circle = 1 shot · double circle = 2 shots (handicap off low player) · points awarded on net score</div>`;
  html+=`<div style="padding:0 14px 8px;font-size:10px;color:var(--inkl);font-weight:600">⏱️ ${paceOfPlayStr()}</div>`;
  html+=`</div>`;
  return html;
}

function renderVerticalScorecard(){
  let html=`<div id="totalsCard" style="background:#fff;border-radius:12px;overflow:hidden;padding:0 0 8px;margin-top:10px">`;
  html+=`<div style="background:var(--gd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
    <div><div style="font-size:15px;font-weight:700;color:var(--gold);font-family:Georgia,serif">Derrick GWC · Scorecard</div><div style="font-size:11px;color:var(--gl)">${roundDateStr()}${G.startHole>1?(' · Shotgun start: Hole '+G.startHole):''}</div></div>
    <button class="export-btn" id="totExportBtn" onclick="exportTotals()" ontouchstart="">📸 Export</button>
  </div>`;

  html+=`<div class="msum"><div class="msum-hdr">Scorecard</div><div class="scwrap"><table class="sct"><thead><tr>
    <th class="pnm">Hole</th><th>Par</th><th>HCP</th>`;
  G.players.forEach(p=>{
    const parts=p.name.trim().split(/\s+/);
    const nameDisp = parts.length>1
      ? `${parts[0]}<br><span style="font-size:8px;font-weight:400;opacity:.8">${parts.slice(1).join(' ')}</span>`
      : p.name;
    html+=`<th>${nameDisp}<br><span style="font-size:8px;font-weight:400;opacity:.8">Idx ${p.idx.toFixed(1)}</span></th>`;
  });
  html+='</tr></thead><tbody>';

  // 1st-9th holes played (Nassau "Front 9")
  const fTot=G.players.map(()=>0), fAny=G.players.map(()=>false);
  let fPar=0;
  for(let playIdx=0;playIdx<9;playIdx++){
    const h=actualHoleIdx(playIdx);
    fPar+=G.par[h];
    html+=`<tr><td class="pnm">${h+1}</td><td class="ns">${G.par[h]}</td><td class="ns">${G.si[h]}</td>`;
    G.players.forEach((p,pi)=>{
      const g=G.scores[pi][h];
      if(g!==null){fTot[pi]+=g;fAny[pi]=true;}
      const inner=g!==null ? scoreMark(g,G.par[h]) : '·';
      html+=`<td>${inner}</td>`;
    });
    html+='</tr>';
  }
  // OUT row
  html+=`<tr style="background:#eceff1;font-weight:700"><td class="pnm">OUT</td><td class="ns">${fPar}</td><td class="ns"></td>`;
  G.players.forEach((p,pi)=>html+=`<td>${fAny[pi]?fTot[pi]:'·'}</td>`);
  html+='</tr>';

  // 10th-18th holes played (Nassau "Back 9")
  const bTot=G.players.map(()=>0), bAny=G.players.map(()=>false);
  let bPar=0;
  for(let playIdx=9;playIdx<18;playIdx++){
    const h=actualHoleIdx(playIdx);
    bPar+=G.par[h];
    html+=`<tr><td class="pnm">${h+1}</td><td class="ns">${G.par[h]}</td><td class="ns">${G.si[h]}</td>`;
    G.players.forEach((p,pi)=>{
      const g=G.scores[pi][h];
      if(g!==null){bTot[pi]+=g;bAny[pi]=true;}
      const inner=g!==null ? scoreMark(g,G.par[h]) : '·';
      html+=`<td>${inner}</td>`;
    });
    html+='</tr>';
  }
  // IN row
  html+=`<tr style="background:#eceff1;font-weight:700"><td class="pnm">IN</td><td class="ns">${bPar}</td><td class="ns"></td>`;
  G.players.forEach((p,pi)=>html+=`<td>${bAny[pi]?bTot[pi]:'·'}</td>`);
  html+='</tr>';

  // TOT row
  html+=`<tr style="background:var(--gp);font-weight:800"><td class="pnm">TOT</td><td class="ns">${fPar+bPar}</td><td class="ns"></td>`;
  G.players.forEach((p,pi)=>{
    const tot=(fAny[pi]?fTot[pi]:0)+(bAny[pi]?bTot[pi]:0);
    html+=`<td>${(fAny[pi]&&bAny[pi])?tot:'·'}</td>`;
  });
  html+='</tr>';

  // HCP row — each player's full handicap index
  html+=`<tr style="background:#fff8e1;font-weight:700"><td class="pnm">HCP</td><td class="ns"></td><td class="ns"></td>`;
  G.players.forEach(p=>html+=`<td>${p.idx.toFixed(1)}</td>`);
  html+='</tr>';

  // NET row — gross total minus full handicap index (rounded)
  html+=`<tr style="background:#e8f5e9;font-weight:800;color:var(--gm)"><td class="pnm">NET</td><td class="ns"></td><td class="ns"></td>`;
  G.players.forEach((p,pi)=>{
    const tot=(fAny[pi]?fTot[pi]:0)+(bAny[pi]?bTot[pi]:0);
    const complete=fAny[pi]&&bAny[pi];
    const net=complete?(tot-Math.round(p.idx)):null;
    html+=`<td>${net!==null?net:'·'}</td>`;
  });
  html+='</tr>';

  html+='</tbody></table></div></div>';
  html+='</div>'; // close totalsCard
  return html;
}

// Ordinal suffix: 1st, 2nd, 3rd, 4th...
function ordinal(n){
  const s=['th','st','nd','rd'], v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

// Navigation steps through ACTUAL holes in PLAY ORDER (handles shotgun starts/wrapping)
function goH(d){
  clearTimeout(maybeAutoAdvance._t); // cancel any pending auto-advance so manual nav can't double-step
  const curPlay=playOrderIdx(G.hole);
  const n=curPlay+d;
  if(n<0||n>17)return;

  // When advancing forward, warn if any player is missing a score on the current hole
  if(d>0){
    const missing=G.players.filter((_,pi)=>G.scores[pi][G.hole]===null).map(p=>p.name);
    if(missing.length){
      const err=document.getElementById('holeErr');
      if(err){
        err.innerHTML=`⚠️ Missing score for: <b>${missing.join(', ')}</b><br><span style="font-size:11px;font-weight:400;opacity:.9">If a player has left the round, remove them from all matches via <b>⚙️ Matches</b> above.</span>`;
        err.style.display='block';
        clearTimeout(goH._t);
        goH._t=setTimeout(()=>{ err.style.display='none'; },5000);
      }
      return;
    }
  }

  const err=document.getElementById('holeErr');
  if(err) err.style.display='none';
  G.hole=actualHoleIdx(n);
  saveG();renderCard();
}
